<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Huey Luey Kitchen</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#ffffff;
  color:#222;
}

header{
  background:#f37021;
  color:white;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header h1{
  margin:0;
  font-size:22px;
}

button{
  background:white;
  color:#f37021;
  border:none;
  padding:10px 18px;
  font-weight:bold;
  border-radius:6px;
  cursor:pointer;
}

#app{
  padding:30px;
}

.search{
  width:100%;
  padding:12px;
  margin-bottom:25px;
  border:1px solid #ddd;
  border-radius:6px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
}

.card{
  border:1px solid #eee;
  padding:20px;
  border-radius:8px;
  cursor:pointer;
  background:#fafafa;
  font-weight:bold;
  text-align:center;
}

.card:hover{
  background:#fff3ea;
  border-color:#f37021;
}

.back{
  color:#f37021;
  font-weight:bold;
  margin-bottom:20px;
  cursor:pointer;
}

.recipe-title{
  font-size:26px;
  margin-bottom:10px;
}

.meta{
  color:#666;
  margin-bottom:8px;
}

.columns{
  display:flex;
  gap:50px;
  flex-wrap:wrap;
}

.section-title{
  font-weight:bold;
  margin-bottom:10px;
  color:#f37021;
}
</style>
</head>

<body>

<header>
  <h1>Huey Luey Kitchen</h1>
  <button id="langBtn">EN / ES</button>
</header>

<div id="app">Loading...</div>

<script>

document.addEventListener("DOMContentLoaded", async function(){

let language="en"
let view="home"
let currentCategory=null
let currentRecipe=null
let RECIPES=[]

const files = [
  {file:"items_sides.json", category:"Sides"},
  {file:"sauces_spices.json", category:"Sauces"},
  {file:"dressings.json", category:"Dressings"},
  {file:"food_prepped.json", category:"Prepped Food"},
  {file:"desserts.json", category:"Desserts"},
  {file:"brunch.json", category:"Brunch"}
]

/* ================= LOAD ALL JSON FILES ================= */

for(const f of files){
  try{
    const res = await fetch(f.file)
    const data = await res.json()
    data.forEach(r=>{
      r.category=f.category
      r.procedure_en=r.procedure_detailed_en
      r.procedure_es=r.procedure_detailed_es
    })
    RECIPES=RECIPES.concat(data)
  }catch(err){
    console.error("Error loading", f.file, err)
  }
}

/* ================= RENDER FUNCTIONS ================= */

const app=document.getElementById("app")

function getCategories(){
  return [...new Set(RECIPES.map(r=>r.category))]
}

function renderHome(){
  view="home"
  currentCategory=null
  currentRecipe=null
  app.innerHTML=""

  const search=document.createElement("input")
  search.className="search"
  search.placeholder="Search..."
  search.oninput=()=>renderSearch(search.value)
  app.appendChild(search)

  const grid=document.createElement("div")
  grid.className="grid"

  getCategories().forEach(cat=>{
    const card=document.createElement("div")
    card.className="card"
    card.innerText=cat
    card.onclick=()=>renderCategory(cat)
    grid.appendChild(card)
  })

  app.appendChild(grid)
}

function renderCategory(cat){
  view="category"
  currentCategory=cat
  currentRecipe=null
  app.innerHTML=""

  const back=document.createElement("div")
  back.className="back"
  back.innerText="← Back"
  back.onclick=renderHome
  app.appendChild(back)

  const grid=document.createElement("div")
  grid.className="grid"

  RECIPES.filter(r=>r.category===cat).forEach(r=>{
    const card=document.createElement("div")
    card.className="card"
    card.innerText=r["name_"+language]
    card.onclick=()=>renderRecipe(r)
    grid.appendChild(card)
  })

  app.appendChild(grid)
}

function renderRecipe(recipe){
  view="recipe"
  currentRecipe=recipe
  app.innerHTML=""

  const back=document.createElement("div")
  back.className="back"
  back.innerText="← Back"
  back.onclick=()=>renderCategory(recipe.category)
  app.appendChild(back)

  const page=document.createElement("div")

  page.innerHTML=`
    <div class="recipe-title">${recipe["name_"+language]}</div>
    <div class="meta">${recipe["yield_"+language]} | ${recipe["time_"+language]}</div>
    <div class="meta"><em>${recipe["holding_"+language]}</em></div>

    <div class="columns">
      <div>
        <div class="section-title">Ingredients</div>
        <ul>${recipe["ingredients_"+language].map(i=>"<li>"+i+"</li>").join("")}</ul>
      </div>
      <div>
        <div class="section-title">Procedure</div>
        <ol>${recipe["procedure_"+language].map(p=>"<li>"+p+"</li>").join("")}</ol>
      </div>
    </div>
  `
  app.appendChild(page)
}

function renderSearch(text){
  view="search"
  app.innerHTML=""

  const back=document.createElement("div")
  back.className="back"
  back.innerText="← Back"
  back.onclick=renderHome
  app.appendChild(back)

  const grid=document.createElement("div")
  grid.className="grid"

  RECIPES.forEach(r=>{
    const name=r["name_"+language]
    if(name.toLowerCase().includes(text.toLowerCase())){
      const card=document.createElement("div")
      card.className="card"
      card.innerText=name
      card.onclick=()=>renderRecipe(r)
      grid.appendChild(card)
    }
  })

  app.appendChild(grid)
}

/* ================= LANGUAGE TOGGLE FIXED ================= */

document.getElementById("langBtn").onclick=function(){
  language=language==="en"?"es":"en"

  if(view==="home") renderHome()
  if(view==="category") renderCategory(currentCategory)
  if(view==="recipe") renderRecipe(currentRecipe)
}

/* ================= START ================= */

renderHome()

})

</script>

</body>
</html>
