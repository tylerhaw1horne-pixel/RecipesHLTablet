<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Huey Luey’s Kitchen</title>

<style>

/* ===== BASE ===== */

body{
  margin:0;
  font-family:Inter, -apple-system, BlinkMacSystemFont, sans-serif;
  background:#f3f4f6;
  color:#111827;
  transition:all .25s ease;
}

body.kitchen-mode{
  background:white;
  font-size:20px;
}

header{
  background:#f37021;
  color:white;
  padding:14px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:600;
  box-shadow:0 3px 12px rgba(0,0,0,.15);
}

.controls button{
  background:white;
  color:#f37021;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  margin-left:8px;
  cursor:pointer;
  font-weight:600;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

/* ===== CARDS ===== */

.card{
  background:white;
  padding:18px;
  margin:12px 0;
  border-radius:14px;
  box-shadow:0 4px 16px rgba(0,0,0,.08);
  cursor:pointer;
  transition:.2s;
}

.card:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(0,0,0,.12);
}

.back{
  display:inline-block;
  background:#1e7f3f;
  color:white;
  padding:8px 14px;
  border-radius:8px;
  margin-bottom:15px;
  cursor:pointer;
}

.search{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid #d1d5db;
  margin-bottom:15px;
  font-size:16px;
}

.recipe-title{
  font-size:28px;
  font-weight:700;
  margin-bottom:10px;
}

.section{
  margin-top:20px;
}

.section h4{
  color:#f37021;
  margin-bottom:8px;
}

.scale-row{
  margin-top:15px;
}

.scale-row button{
  margin-right:6px;
}

button{
  padding:6px 10px;
  border-radius:6px;
  border:none;
  background:#f37021;
  color:white;
  cursor:pointer;
}

input[type="number"]{
  width:80px;
  padding:6px;
  margin-left:5px;
}

.edit-panel{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.6);
  display:flex;
  justify-content:center;
  align-items:center;
}

.edit-box{
  background:white;
  padding:20px;
  width:90%;
  max-width:500px;
  border-radius:12px;
}

.edit-box input{
  width:100%;
  margin-bottom:10px;
  padding:8px;
}

@media print {
  header, .back, .scale-row, .search, .controls {
    display:none;
  }
}

</style>
</head>
<body>

<header>
  Huey Luey’s Kitchen
  <div class="controls">
    <button id="langToggle">ES</button>
    <button id="kitchenToggle">Kitchen</button>
    <button id="editToggle">Edit</button>
  </div>
</header>

<div class="container" id="app"></div>

<script>

/* ===== STATE ===== */

let currentLanguage="en"
let currentCategory=null
let currentRecipe=null
let dataCache={}
let scaleFactor=1
let editUnlocked=false
const PASSWORD="hueys2026"   // THIS IS YOUR PASSWORD

const categories=[
  {en:"Items & Sides", es:"Acompañamientos", file:"items_sides.json"},
  {en:"Dressings", es:"Aderezos", file:"dressings.json"},
  {en:"Sauces & Spices", es:"Salsas y Especias", file:"sauces_spices.json"},
  {en:"Food Prepped", es:"Producción", file:"food_prepped.json"},
  {en:"Desserts", es:"Postres", file:"desserts.json"},
  {en:"Brunch", es:"Brunch", file:"brunch.json"}
]

/* ===== TOGGLES ===== */

document.getElementById("langToggle").onclick=()=>{
  currentLanguage=currentLanguage==="en"?"es":"en"
  document.getElementById("langToggle").innerText=currentLanguage==="en"?"ES":"EN"
  if(currentRecipe) renderRecipe(currentRecipe)
  else renderCategories()
}

document.getElementById("kitchenToggle").onclick=()=>{
  document.body.classList.toggle("kitchen-mode")
}

document.getElementById("editToggle").onclick=()=>{
  if(editUnlocked){
    editUnlocked=false
    alert("Edit Locked")
  }else{
    const p=prompt("Enter Password")
    if(p===PASSWORD){
      editUnlocked=true
      alert("Edit Mode Enabled")
    }
  }
}

/* ===== RENDER CATEGORIES ===== */

function renderCategories(){
  currentRecipe=null
  const app=document.getElementById("app")
  app.innerHTML=""

  const search=document.createElement("input")
  search.className="search"
  search.placeholder=currentLanguage==="en"?"Search recipes":"Buscar recetas"
  search.addEventListener("input",()=>searchAll(search.value))
  app.appendChild(search)

  categories.forEach(cat=>{
    const div=document.createElement("div")
    div.className="card"
    div.innerText=currentLanguage==="en"?cat.en:cat.es
    div.onclick=()=>loadCategory(cat)
    app.appendChild(div)
  })
}

/* ===== SEARCH ===== */

async function searchAll(text){
  if(text.length<2){ renderCategories(); return }
  const app=document.getElementById("app")
  app.innerHTML=""
  for(const cat of categories){
    const data=await loadData(cat)
    data.forEach(r=>{
      if(r["name_"+currentLanguage].toLowerCase().includes(text.toLowerCase())){
        const div=document.createElement("div")
        div.className="card"
        div.innerText=r["name_"+currentLanguage]
        div.onclick=()=>renderRecipe(r,cat)
        app.appendChild(div)
      }
    })
  }
}

/* ===== LOAD CATEGORY ===== */

async function loadCategory(cat){
  currentCategory=cat
  const data=await loadData(cat)
  const app=document.getElementById("app")
  app.innerHTML=""

  const back=document.createElement("div")
  back.className="back"
  back.innerText="←"
  back.onclick=renderCategories
  app.appendChild(back)

  data.forEach(r=>{
    const div=document.createElement("div")
    div.className="card"
    div.innerText=r["name_"+currentLanguage]
    div.onclick=()=>renderRecipe(r,cat)
    app.appendChild(div)
  })
}

/* ===== LOAD JSON ===== */

async function loadData(cat){
  if(dataCache[cat.file]) return dataCache[cat.file]
  const res=await fetch(cat.file)
  const data=await res.json()
  dataCache[cat.file]=data
  return data
}

/* ===== RENDER RECIPE ===== */

function renderRecipe(recipe,cat){
  currentRecipe=recipe
  scaleFactor=1
  if(cat) currentCategory=cat

  const app=document.getElementById("app")
  app.innerHTML=""

  const back=document.createElement("div")
  back.className="back"
  back.innerText="←"
  back.onclick=()=>loadCategory(currentCategory)
  app.appendChild(back)

  const title=document.createElement("div")
  title.className="recipe-title"
  title.innerText=recipe["name_"+currentLanguage]
  app.appendChild(title)

  renderIngredients(recipe)

  if(editUnlocked){
    const editBtn=document.createElement("button")
    editBtn.innerText="Edit Recipe"
    editBtn.onclick=()=>openEdit(recipe)
    app.appendChild(editBtn)
  }
}

/* ===== SCALE ===== */

function renderIngredients(recipe){
  const app=document.getElementById("app")

  const section=document.createElement("div")
  section.className="section"
  section.innerHTML="<h4>"+(currentLanguage==="en"?"Ingredients":"Ingredientes")+"</h4>"
  const ul=document.createElement("ul")

  recipe["ingredients_"+currentLanguage].forEach(line=>{
    const li=document.createElement("li")
    li.innerText=scaleLine(line)
    ul.appendChild(li)
  })

  section.appendChild(ul)
  app.appendChild(section)

  const scaleRow=document.createElement("div")
  scaleRow.className="scale-row"

  const half=document.createElement("button")
  half.innerText="0.5x"
  half.onclick=()=>setScale(0.5)

  const two=document.createElement("button")
  two.innerText="2x"
  two.onclick=()=>setScale(2)

  const three=document.createElement("button")
  three.innerText="3x"
  three.onclick=()=>setScale(3)

  const custom=document.createElement("input")
  custom.type="number"
  custom.step="0.1"

  const go=document.createElement("button")
  go.innerText="Go"
  go.onclick=()=>{
    if(custom.value>0) setScale(parseFloat(custom.value))
  }

  scaleRow.appendChild(half)
  scaleRow.appendChild(two)
  scaleRow.appendChild(three)
  scaleRow.appendChild(custom)
  scaleRow.appendChild(go)

  app.appendChild(scaleRow)
}

function scaleLine(line){
  const match=line.match(/(.*?–\s*)([\d.]+)/)
  if(!match) return line
  const base=parseFloat(match[2])
  const scaled=(base*scaleFactor).toFixed(2).replace(/\.00$/,'')
  return line.replace(match[2],scaled)
}

function setScale(f){
  scaleFactor=f
  renderRecipe(currentRecipe)
}

/* ===== EDIT ===== */

function openEdit(recipe){
  const overlay=document.createElement("div")
  overlay.className="edit-panel"

  const box=document.createElement("div")
  box.className="edit-box"

  const nameInput=document.createElement("input")
  nameInput.value=recipe.name_en

  const save=document.createElement("button")
  save.innerText="Save"
  save.onclick=()=>{
    recipe.name_en=nameInput.value
    overlay.remove()
    renderRecipe(recipe)
  }

  box.appendChild(nameInput)
  box.appendChild(save)
  overlay.appendChild(box)
  document.body.appendChild(overlay)
}

/* ===== INIT ===== */

renderCategories()

</script>
</body>
</html>
