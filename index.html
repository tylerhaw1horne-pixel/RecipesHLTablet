   MASTER DATA – ALL RECIPES
   ============================ */

const RECIPES = [

/* ===== SIDES ===== */
{

  name_en: "Pico de Gallo",
  name_es: "Pico de Gallo",

  yield_es: "4 – 1/3 Charolas",
  time_en: "Prep: 20 min",
  time_es: "Preparación: 20 min",
  holding_en: "Cold hold below 41°F. 48 hr max.",
  holding_es: "Mantener frío bajo 41°F. Máximo 48 horas.",
  ingredients_en: [
    "Diced Tomato – 20 lbs",
    "Onion – 6 lbs",
    "Lime Juice – 1 cup",
    "Salt – 8 Tbsp",
    "Cilantro – 8 cups",

  ],
  ingredients_es: [

    "Cebolla – 6 lbs",

    "Sal – 8 cdas",
    "Cilantro picado – 8 tazas",
    "Jalapeño fresco – 1 taza"
  ],
  procedure_en: [
    "Dice tomatoes uniform.",
    "Combine all ingredients.",
    "Adjust lime and salt.",
    "Label and refrigerate."
  ],
  procedure_es: [
    "Picar tomate parejo.",
    "Mezclar todo bien.",
    "Ajustar limón y sal al gusto.",
    "Etiquetar y pa'l frío."
  ],
  image: "images/pico.jpg"
},

/* ADD THE REST OF YOUR RECIPES BELOW
   JUST COPY THEM AND ADD:
   category: "Sides" OR "Sauces" OR "Brunch" etc.
*/

/* Example from Brunch */
{
  category: "Brunch",
  name_en: "Pancakes",
  name_es: "Panqueques",
  yield_en: "Full Brunch Batch",
  yield_es: "Lote Completo Brunch",
  time_en: "Cook: 2–3 min per side",
  time_es: "Cocción: 2–3 min por lado",
  holding_en: "Hot hold 135°F max 30 min.",
  holding_es: "Mantener caliente 135°F máximo 30 min.",
  ingredients_en: [
    "Flour – 4.5 qt",
    "Baking Powder – 3/4 cup",
    "Salt – 1/2 Tbsp",
    "Sugar – 2.25 cups",
    "Cinnamon – 2 Tbsp",
    "Eggs – 11",
    "Milk – 3.75 qt",
    "Butter – 3 cups",
    "Vanilla – 2 Tbsp"
  ],
  ingredients_es: [
    "Harina – 4.5 qt",
    "Polvo hornear – 3/4 taza",
    "Sal – 1/2 cda",
    "Azúcar – 2.25 tazas",
    "Canela – 2 cdas",
    "Huevos – 11",
    "Leche – 3.75 qt",
    "Mantequilla – 3 tazas",
    "Vainilla – 2 cdas"
  ],
  procedure_en: [
    "Mix dry ingredients.",
    "Add wet ingredients.",
    "Cook on flat top."
  ],
  procedure_es: [
    "Mezclar secos.",
    "Agregar líquidos.",
    "Cocinar en plancha bien caliente."
  ],
  image: "images/pancakes.jpg"
}

]

/* ============================
   SYSTEM
   ============================ */

let language = "en"
let currentCategory = null

function getCategories(){
  return [...new Set(RECIPES.map(r=>r.category))]
}

function renderHome(){
  const app=document.getElementById("app")
  app.innerHTML=""

  const search=document.createElement("input")
  search.className="search"
  search.placeholder="Search Recipes..."
  search.oninput=()=>renderSearch(search.value)
  app.appendChild(search)

  const grid=document.createElement("div")
  grid.className="grid"

  getCategories().forEach(cat=>{
    const card=document.createElement("div")
    card.className="card"
    card.innerText=cat
    card.onclick=()=>renderCategory(cat)
    grid.appendChild(card)
  })

  app.appendChild(grid)
}

function renderCategory(cat){
  currentCategory=cat
  const app=document.getElementById("app")
  app.innerHTML=""

  const back=document.createElement("div")
  back.className="back"
  back.innerText="← Back"
  back.onclick=renderHome
  app.appendChild(back)

  const grid=document.createElement("div")
  grid.className="grid"

  RECIPES.filter(r=>r.category===cat).forEach(r=>{
    const card=document.createElement("div")
    card.className="card"
    card.innerText=r["name_"+language]
    card.onclick=()=>renderRecipe(r)
    grid.appendChild(card)
  })

  app.appendChild(grid)
}

function renderSearch(text){
  const app=document.getElementById("app")
  app.innerHTML=""

  const back=document.createElement("div")
  back.className="back"
  back.innerText="← Back"
  back.onclick=renderHome
  app.appendChild(back)

  const grid=document.createElement("div")
  grid.className="grid"

  RECIPES.forEach(r=>{
    const name=r["name_"+language]
    if(name.toLowerCase().includes(text.toLowerCase())){
      const card=document.createElement("div")
      card.className="card"
      card.innerText=name
      card.onclick=()=>renderRecipe(r)
      grid.appendChild(card)
    }
  })

  app.appendChild(grid)
}

function renderRecipe(recipe){
  const app=document.getElementById("app")
  app.innerHTML=""

  const back=document.createElement("div")
  back.className="back"
  back.innerText="← Back"
  back.onclick=()=>renderCategory(recipe.category)
  app.appendChild(back)

  const page=document.createElement("div")
  page.className="recipe-page"

  page.innerHTML=`
    <div class="recipe-title">${recipe["name_"+language]}</div>
    <div class="meta">
      ${recipe["yield_"+language]} | ${recipe["time_"+language]}
    </div>
    <div class="meta" style="font-style:italic;">
      ${recipe["holding_"+language]}
    </div>
    ${recipe.image ? `<img src="${recipe.image}" style="max-width:100%;margin:25px 0;border-radius:12px;">`:""}
    <div class="columns">
      <div style="flex:1">
        <div class="section-title">Ingredients</div>
        <ul>
          ${recipe["ingredients_"+language].map(i=>"<li>"+i+"</li>").join("")}
        </ul>
      </div>
      <div style="flex:1">
        <div class="section-title">Procedure</div>
        <ol>
          ${recipe["procedure_"+language].map(p=>"<li>"+p+"</li>").join("")}
        </ol>
      </div>
    </div>
  `

  app.appendChild(page)
}

document.getElementById("langBtn").onclick=()=>{
  language=language==="en"?"es":"en"
  if(currentCategory) renderCategory(currentCategory)
  else renderHome()
}

renderHome()

</script>
