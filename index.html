<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Huey Luey's Kitchen Hub</title>

<style>

:root{
--orange:#f37021;
--green:#2e7d32;
--light:#f7f9fc;
--card:#ffffff;
--border:#e5e5e5;
--shadow:0 4px 12px rgba(0,0,0,0.08);
}

body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background:var(--light);
color:#222;
}

header{
background:var(--orange);
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:var(--shadow);
}

header h1{
margin:0;
font-size:22px;
}

.controls{
display:flex;
gap:10px;
}

button{
background:var(--green);
color:white;
border:none;
padding:12px 18px;
border-radius:10px;
font-weight:600;
cursor:pointer;
font-size:14px;
transition:0.2s;
}

button:hover{
transform:scale(1.03);
opacity:0.9;
}

.search-bar{
width:100%;
padding:18px;
border:none;
border-bottom:2px solid var(--border);
font-size:16px;
outline:none;
}

.container{
padding:25px;
max-width:1000px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
gap:18px;
}

.card{
background:var(--card);
padding:20px;
border-radius:14px;
box-shadow:var(--shadow);
cursor:pointer;
transition:0.25s;
border:1px solid var(--border);
}

.card:hover{
transform:translateY(-4px);
}

.recipe-title{
font-size:22px;
margin-bottom:15px;
}

.ingredients{
font-size:16px;
line-height:1.6;
}

.back-btn{
margin-bottom:20px;
}

.fade{
animation:fadeIn 0.25s ease-in-out;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(5px);}
to{opacity:1; transform:translateY(0);}
}

footer{
text-align:center;
padding:15px;
font-size:12px;
color:#777;
}

</style>
</head>

<body>

<header>
<h1>Huey Luey's Kitchen Tablet</h1>
<div class="controls">
<button onclick="toggleLanguage()">EN / ES</button>
</div>
</header>

<input class="search-bar" id="searchInput" placeholder="Search within category..." onkeyup="searchItems(this.value)">

<div class="container fade" id="app"></div>

<footer>
Offline Enabled • Multi-Category System
</footer>

<script>

let language="en";
let currentCategory=null;
let categoryFiles={
"Items & Sides":"items_sides.json",
"Sauces & Spices":"sauces_spices.json",
"Dressings":"dressings.json",
"Food Prepped":"food_prepped.json",
"Desserts":"desserts.json",
"Brunch":"brunch.json"
};

let currentData=[];

function renderCategories(){
currentCategory=null;
document.getElementById("searchInput").value="";
const app=document.getElementById("app");
app.innerHTML="";
const grid=document.createElement("div");
grid.className="grid";

Object.keys(categoryFiles).forEach(cat=>{
const div=document.createElement("div");
div.className="card";
div.innerText=cat;
div.onclick=()=>loadCategory(cat);
grid.appendChild(div);
});

app.appendChild(grid);
}

async function loadCategory(category){
currentCategory=category;
document.getElementById("searchInput").value="";
const response=await fetch(categoryFiles[category]);
currentData=await response.json();
renderItems();
}

function renderItems(){
const app=document.getElementById("app");
app.innerHTML='<button class="back-btn" onclick="renderCategories()">⬅ Back to Categories</button>';

const grid=document.createElement("div");
grid.className="grid";

currentData.forEach(item=>{
const div=document.createElement("div");
div.className="card";
div.innerText=language==="en"?item.name_en:item.name_es;
div.onclick=()=>renderRecipe(item);
grid.appendChild(div);
});

app.appendChild(grid);
}

function renderRecipe(item){
const app=document.getElementById("app");
app.innerHTML='<button class="back-btn" onclick="renderItems()">⬅ Back to Items</button>';

const title=document.createElement("div");
title.className="recipe-title";
title.innerText=language==="en"?item.name_en:item.name_es;

const list=document.createElement("div");
list.className="ingredients";

const ingredients=language==="en"?item.ingredients_en:item.ingredients_es;

ingredients.forEach(i=>{
const line=document.createElement("div");
line.innerText="• "+i;
list.appendChild(line);
});

app.appendChild(title);
app.appendChild(list);
}

function toggleLanguage(){
language=language==="en"?"es":"en";
if(currentCategory){
renderItems();
}else{
renderCategories();
}
}

function searchItems(term){
if(!currentCategory) return;
term=term.toLowerCase();
const filtered=currentData.filter(item=>
item.name_en.toLowerCase().includes(term)
);

const app=document.getElementById("app");
app.innerHTML='<button class="back-btn" onclick="renderItems()">⬅ Back to Items</button>';

const grid=document.createElement("div");
grid.className="grid";

filtered.forEach(item=>{
const div=document.createElement("div");
div.className="card";
div.innerText=language==="en"?item.name_en:item.name_es;
div.onclick=()=>renderRecipe(item);
grid.appendChild(div);
});

app.appendChild(grid);
}

if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js');
}

renderCategories();

</script>

</body>
</html>
