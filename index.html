<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Huey Luey's Kitchen Recipe Hub</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#ffffff;
color:#222;
}

header{
background:#f37021;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
padding:8px 14px;
border:none;
background:#2e7d32;
color:white;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.search{
width:100%;
padding:12px;
border:none;
border-bottom:2px solid #ddd;
font-size:16px;
}

.container{
padding:20px;
}

.card{
background:#f9f9f9;
padding:15px;
margin:10px 0;
border-radius:8px;
cursor:pointer;
border:1px solid #eee;
}

.card:hover{
background:#f0f0f0;
}

.back-btn{
margin-bottom:15px;
}

ul{
padding-left:20px;
}
</style>
</head>

<body>

<header>
<h2>Huey Luey's Recipe Hub</h2>
<button onclick="toggleLanguage()">EN / ES</button>
</header>

<input class="search" placeholder="Search..." onkeyup="searchRecipes(this.value)">
<div class="container" id="app"></div>

<script>

let language="en";
let currentCategory=null;

const data = FULL_MASTER_DATA_PLACEHOLDER;

function renderCategories(){
currentCategory=null;
const app=document.getElementById("app");
app.innerHTML="";
data.forEach(cat=>{
const div=document.createElement("div");
div.className="card";
div.innerText=cat.category;
div.onclick=()=>renderItems(cat);
app.appendChild(div);
});
}

function renderItems(cat){
currentCategory=cat;
const app=document.getElementById("app");
app.innerHTML='<button class="back-btn" onclick="renderCategories()">⬅ Back</button>';
cat.items.forEach(item=>{
const div=document.createElement("div");
div.className="card";
div.innerText=language==="en"?item.name_en:item.name_es;
div.onclick=()=>renderRecipe(item);
app.appendChild(div);
});
}

function renderRecipe(item){
const app=document.getElementById("app");
app.innerHTML='<button class="back-btn" onclick="renderItems(currentCategory)">⬅ Back</button>';
const title=document.createElement("h3");
title.innerText=language==="en"?item.name_en:item.name_es;
app.appendChild(title);

const ul=document.createElement("ul");
const ingredients=language==="en"?item.ingredients_en:item.ingredients_es;
ingredients.forEach(i=>{
const li=document.createElement("li");
li.innerText=i;
ul.appendChild(li);
});
app.appendChild(ul);
}

function toggleLanguage(){
language=language==="en"?"es":"en";
if(currentCategory) renderItems(currentCategory);
else renderCategories();
}

function searchRecipes(term){
if(!currentCategory) return;
term=term.toLowerCase();
const app=document.getElementById("app");
app.innerHTML='<button class="back-btn" onclick="renderItems(currentCategory)">⬅ Back</button>';
currentCategory.items
.filter(item=>item.name_en.toLowerCase().includes(term))
.forEach(item=>{
const div=document.createElement("div");
div.className="card";
div.innerText=language==="en"?item.name_en:item.name_es;
div.onclick=()=>renderRecipe(item);
app.appendChild(div);
});
}

renderCategories();

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
