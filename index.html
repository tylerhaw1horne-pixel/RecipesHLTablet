<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Huey Luey’s Kitchen Tablet</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f4f7f3;
  color:#222;
}

header{
  background:#1f5f36;
  color:white;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header h1{
  margin:0;
  font-size:22px;
}

button{
  padding:10px 18px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:600;
}

.lang-btn{
  background:#f26522;
  color:white;
}

.categories{
  display:flex;
  gap:10px;
  padding:20px;
  flex-wrap:wrap;
}

.cat-btn{
  background:white;
  border:2px solid #1f5f36;
  color:#1f5f36;
}

.cat-btn.active{
  background:#1f5f36;
  color:white;
}

.container{
  padding:30px;
}

.recipe-card{
  background:white;
  border-radius:14px;
  padding:30px;
  margin-bottom:40px;
  box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

.recipe-header h2{
  margin-top:0;
  color:#1f5f36;
}

.recipe-body{
  display:flex;
  gap:40px;
}

.recipe-left{
  flex:2;
}

.recipe-right{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
}

.recipe-right img{
  max-width:100%;
  border-radius:12px;
}

.meta{
  margin-bottom:12px;
  font-weight:600;
  color:#2f6b3c;
}

h3{
  margin-bottom:6px;
  color:#f26522;
}

ul,ol{
  padding-left:20px;
}
</style>
</head>

<body>

<header>
  <h1>Huey Luey’s Kitchen Tablet</h1>
  <button class="lang-btn" id="langToggle">ES</button>
</header>

<div class="categories">
  <button class="cat-btn" data-file="items_sides.json">Items & Sides</button>
  <button class="cat-btn" data-file="food_prepped.json">Food Prepped</button>
  <button class="cat-btn" data-file="sauces_spices.json">Sauces & Spices</button>
  <button class="cat-btn" data-file="desserts.json">Desserts</button>
  <button class="cat-btn" data-file="brunch.json">Brunch</button>
</div>

<div class="container" id="recipeContainer"></div>

<script>
let currentLang = "en";
let currentFile = null;

const container = document.getElementById("recipeContainer");
const langToggle = document.getElementById("langToggle");
const catButtons = document.querySelectorAll(".cat-btn");

langToggle.addEventListener("click", ()=>{
  currentLang = currentLang === "en" ? "es" : "en";
  langToggle.textContent = currentLang === "en" ? "ES" : "EN";
  if(currentFile) loadCategory(currentFile);
});

catButtons.forEach(btn=>{
  btn.addEventListener("click", ()=>{
    catButtons.forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    currentFile = btn.dataset.file;
    loadCategory(currentFile);
  });
});

function loadCategory(file){
  fetch(file + "?v=" + Date.now())
    .then(res=>res.json())
    .then(data=>{
      container.innerHTML = "";
      data.forEach(recipe=>{
        container.innerHTML += renderRecipe(recipe);
      });
    });
}

function renderRecipe(recipe){

  const name = recipe["name_"+currentLang] || "";
  const yieldText = recipe["yield_"+currentLang] || "";
  const time = recipe["time_"+currentLang] || "";
  const holding = recipe["holding_"+currentLang] || "";
  const ingredients = recipe["ingredients_"+currentLang] || [];
  const procedure = recipe["procedure_"+currentLang] || [];
  const image = recipe["image"] || "";

  return `
  <div class="recipe-card">

    <div class="recipe-header">
      <h2>${name}</h2>
    </div>

    <div class="recipe-body">

      <div class="recipe-left">

        ${yieldText ? `<div class="meta"><strong>${currentLang==="en"?"Yield":"Rendimiento"}:</strong> ${yieldText}</div>`:""}
        ${time ? `<div class="meta"><strong>${currentLang==="en"?"Time":"Tiempo"}:</strong> ${time}</div>`:""}
        ${holding ? `<div class="meta"><strong>${currentLang==="en"?"Holding":"Conservación"}:</strong> ${holding}</div>`:""}

        <h3>${currentLang==="en"?"Ingredients":"Ingredientes"}</h3>
        <ul>
          ${ingredients.map(i=>`<li>${i}</li>`).join("")}
        </ul>

        <h3>${currentLang==="en"?"Procedure":"Procedimiento"}</h3>
        <ol>
          ${procedure.map(p=>`<li>${p}</li>`).join("")}
        </ol>

      </div>

      <div class="recipe-right">
        ${image ? `<img src="${image}" alt="${name}">` : ""}
      </div>

    </div>

  </div>
  `;
}
</script>

</body>
</html>
