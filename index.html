<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Huey Luey’s Recipe Hub</title>

<style>
body{
  margin:0;
  font-family:Garamond, serif;
  background:#f4f4f4;
}

header{
  background:#f37021;
  color:white;
  padding:15px 25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:bold;
}

header button{
  background:white;
  color:#f37021;
  border:none;
  padding:6px 10px;
  margin-left:8px;
  border-radius:6px;
  cursor:pointer;
}

.container{
  max-width:900px;
  margin:30px auto;
  padding:20px;
}

.card{
  background:white;
  padding:18px;
  margin-bottom:12px;
  border-radius:8px;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
  cursor:pointer;
}

.search{
  width:100%;
  padding:10px;
  border:1px solid #ccc;
  margin-bottom:18px;
  font-size:16px;
}

.recipe-page{
  background:white;
  padding:40px;
  border-radius:8px;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.recipe-title{
  text-align:center;
  font-size:32px;
  font-weight:bold;
}

.divider{
  text-align:center;
  margin:15px 0;
}

.columns{
  display:flex;
  gap:40px;
}

.col{
  flex:1;
}

.section-title{
  font-weight:bold;
  border-bottom:2px solid #f37021;
  margin-bottom:10px;
  padding-bottom:4px;
}

.scale-controls{
  margin-top:20px;
}

.scale-controls button{
  margin-right:6px;
}

.back{
  cursor:pointer;
  margin-bottom:20px;
  display:inline-block;
  font-weight:bold;
  color:#1e7f3f;
}
</style>
</head>
<body>

<header>
  Huey Luey’s Recipe Hub
  <div>
    <button id="langBtn">ES</button>
    <button id="editBtn">Edit</button>
  </div>
</header>

<div class="container" id="app"></div>

<script>

/* ========= STATE ========= */

let language="en"
let editMode=false
let scaleFactor=1
const PASSWORD="hueys2026"

const data={
  "Items & Sides":[
    {
      name_en:"Pico de Gallo",
      name_es:"Pico de Gallo",
      ingredients_en:["Diced Tomato – 20","Onion – 6"],
      ingredients_es:["Tomate – 20","Cebolla – 6"],
      procedure_en:["Mix gently.","Hold cold."],
      procedure_es:["Mezclar suave.","Mantener frío."]
    }
  ],
  "Desserts":[
    {
      name_en:"Tres Leches Cake",
      name_es:"Pastel Tres Leches",
      ingredients_en:["Sugar – 1.5","Flour – 2.5"],
      ingredients_es:["Azúcar – 1.5","Harina – 2.5"],
      procedure_en:["Bake cake.","Add milk mix."],
      procedure_es:["Hornear.","Agregar mezcla."]
    }
  ]
}

let currentCategory=null
let currentRecipe=null

/* ========= RENDER CATEGORIES ========= */

function renderCategories(){
  currentCategory=null
  currentRecipe=null
  const app=document.getElementById("app")
  app.innerHTML=""

  const search=document.createElement("input")
  search.className="search"
  search.placeholder="Search Recipes"
  search.oninput=()=>searchRecipes(search.value)
  app.appendChild(search)

  Object.keys(data).forEach(cat=>{
    const div=document.createElement("div")
    div.className="card"
    div.innerText=cat
    div.onclick=()=>openCategory(cat)
    app.appendChild(div)
  })
}

/* ========= SEARCH ========= */

function searchRecipes(text){
  if(text.length<1){
    renderCategories()
    return
  }

  const app=document.getElementById("app")
  app.innerHTML=""

  Object.keys(data).forEach(cat=>{
    data[cat].forEach(r=>{
      if(r["name_"+language].toLowerCase().includes(text.toLowerCase())){
        const div=document.createElement("div")
        div.className="card"
        div.innerText=r["name_"+language]
        div.onclick=()=>openRecipe(cat,r)
        app.appendChild(div)
      }
    })
  })
}

/* ========= CATEGORY ========= */

function openCategory(cat){
  currentCategory=cat
  const app=document.getElementById("app")
  app.innerHTML=""

  const back=document.createElement("div")
  back.className="back"
  back.innerText="← Back"
  back.onclick=renderCategories
  app.appendChild(back)

  data[cat].forEach(r=>{
    const div=document.createElement("div")
    div.className="card"
    div.innerText=r["name_"+language]
    div.onclick=()=>openRecipe(cat,r)
    app.appendChild(div)
  })
}

/* ========= RECIPE ========= */

function openRecipe(cat,recipe){
  currentCategory=cat
  currentRecipe=recipe
  scaleFactor=1

  const app=document.getElementById("app")
  app.innerHTML=""

  const back=document.createElement("div")
  back.className="back"
  back.innerText="← Back"
  back.onclick=()=>openCategory(cat)
  app.appendChild(back)

  const page=document.createElement("div")
  page.className="recipe-page"

  page.innerHTML=`
    <div class="recipe-title">${recipe["name_"+language]}</div>
    <div class="divider">────────────</div>

    <div class="columns">
      <div class="col">
        <div class="section-title">INGREDIENTS</div>
        <ul id="ingredients"></ul>
      </div>
      <div class="col">
        <div class="section-title">PROCEDURE</div>
        <ol id="procedure"></ol>
      </div>
    </div>

    <div class="scale-controls">
      <button onclick="setScale(0.5)">0.5x</button>
      <button onclick="setScale(2)">2x</button>
      <button onclick="setScale(3)">3x</button>
      <input type="number" id="customScale" placeholder="x">
      <button onclick="applyScale()">Apply</button>
    </div>
  `

  app.appendChild(page)
  renderRecipeContent()
}

/* ========= SCALE ========= */

function scaleLine(line){
  const match=line.match(/(.*?–\s*)([\d.]+)/)
  if(!match) return line
  const base=parseFloat(match[2])
  const scaled=(base*scaleFactor).toFixed(2).replace(/\.00$/,'')
  return line.replace(match[2],scaled)
}

function renderRecipeContent(){
  const ing=document.getElementById("ingredients")
  const proc=document.getElementById("procedure")
  ing.innerHTML=""
  proc.innerHTML=""

  currentRecipe["ingredients_"+language].forEach(i=>{
    const li=document.createElement("li")
    li.innerText=scaleLine(i)
    ing.appendChild(li)
  })

  currentRecipe["procedure_"+language].forEach(p=>{
    const li=document.createElement("li")
    li.innerText=p
    proc.appendChild(li)
  })
}

function setScale(f){
  scaleFactor=f
  renderRecipeContent()
}

function applyScale(){
  const val=parseFloat(document.getElementById("customScale").value)
  if(val>0){
    scaleFactor=val
    renderRecipeContent()
  }
}

/* ========= TOGGLES ========= */

document.getElementById("langBtn").onclick=()=>{
  language=language==="en"?"es":"en"
  if(currentRecipe){
    openRecipe(currentCategory,currentRecipe)
  }else{
    renderCategories()
  }
}

document.getElementById("editBtn").onclick=()=>{
  const p=prompt("Password?")
  if(p===PASSWORD){
    alert("Edit Mode Enabled (basic demo)")
  }
}

/* ========= START ========= */

renderCategories()

</script>
</body>
</html>
