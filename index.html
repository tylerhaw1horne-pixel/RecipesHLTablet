<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Huey Luey’s Kitchen Pro</title>

<style>

/* ===== GLOBAL ===== */

body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:#f8fafc;
  color:#111;
  transition:.3s;
}

body.kitchen-mode{
  background:white;
  color:black;
  font-size:20px;
}

header{
  background:#f37021;
  color:white;
  padding:14px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:600;
}

.header-controls button{
  background:white;
  color:#f37021;
  border:none;
  padding:6px 10px;
  margin-left:8px;
  border-radius:6px;
  font-weight:600;
  cursor:pointer;
}

.container{
  padding:20px;
  max-width:900px;
  margin:auto;
}

.card{
  background:white;
  padding:18px;
  margin:12px 0;
  border-radius:12px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
  cursor:pointer;
  transition:.2s;
}

body.kitchen-mode .card{
  box-shadow:none;
  border:2px solid #ddd;
}

.card:hover{
  transform:translateY(-2px);
}

.back-btn{
  background:#1e7f3f;
  color:white;
  padding:8px 14px;
  border-radius:8px;
  display:inline-block;
  margin-bottom:15px;
  cursor:pointer;
}

.recipe-title{
  font-size:28px;
  font-weight:700;
  margin-bottom:15px;
}

.section-title{
  font-weight:700;
  margin-top:22px;
  color:#f37021;
}

ul{
  padding-left:20px;
  line-height:1.6;
}

.search{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
  margin-bottom:15px;
}

.scale-controls{
  margin-top:20px;
}

.scale-controls input{
  width:80px;
  padding:6px;
}

.print-btn{
  background:#f37021;
  color:white;
  padding:10px;
  border:none;
  border-radius:8px;
  margin-top:20px;
  cursor:pointer;
}

@media print {
  header, .back-btn, .search, .scale-controls, .print-btn {
    display:none;
  }
}

</style>
</head>

<body>

<header>
  Huey Luey’s Kitchen Pro
  <div class="header-controls">
    <button id="langBtn">ES</button>
    <button id="kitchenBtn">Kitchen</button>
  </div>
</header>

<div class="container" id="app"></div>

<script>

/* ===== STATE ===== */

let currentLanguage="en"
let currentView="categories"
let currentCategory=null
let currentRecipe=null
let loadedData=[]
let scaleMultiplier=1

const categories=[
  {name_en:"Items & Sides",name_es:"Acompañamientos",file:"items_sides.json"},
  {name_en:"Dressings",name_es:"Aderezos",file:"dressings.json"},
  {name_en:"Sauces & Spices",name_es:"Salsas y Especias",file:"sauces_spices.json"},
  {name_en:"Food Prepped",name_es:"Producción",file:"food_prepped.json"},
  {name_en:"Desserts",name_es:"Postres",file:"desserts.json"},
  {name_en:"Brunch",name_es:"Brunch",file:"brunch.json"}
]

/* ===== TOGGLES ===== */

document.getElementById("langBtn").onclick=()=>{
  currentLanguage=currentLanguage==="en"?"es":"en"
  document.getElementById("langBtn").innerText=currentLanguage==="en"?"ES":"EN"
  refreshView()
}

document.getElementById("kitchenBtn").onclick=()=>{
  document.body.classList.toggle("kitchen-mode")
}

/* ===== VIEW CONTROL ===== */

function refreshView(){
  if(currentView==="categories") renderCategories()
  if(currentView==="recipes") renderRecipeList()
  if(currentView==="recipe") showRecipe(currentRecipe)
}

/* ===== CATEGORY ===== */

function renderCategories(){
  currentView="categories"
  const app=document.getElementById("app")
  app.innerHTML=""
  categories.forEach(cat=>{
    const div=document.createElement("div")
    div.className="card"
    div.innerText=cat["name_"+currentLanguage]
    div.onclick=()=>loadCategory(cat)
    app.appendChild(div)
  })
}

/* ===== LOAD CATEGORY ===== */

async function loadCategory(category){
  currentCategory=category
  currentView="recipes"
  const response=await fetch(category.file)
  loadedData=await response.json()
  renderRecipeList()
}

/* ===== RECIPE LIST ===== */

function renderRecipeList(){
  const app=document.getElementById("app")
  app.innerHTML=""

  const back=document.createElement("div")
  back.className="back-btn"
  back.innerText="←"
  back.onclick=renderCategories
  app.appendChild(back)

  const search=document.createElement("input")
  search.className="search"
  search.placeholder=currentLanguage==="en"?"Search...":"Buscar..."
  search.oninput=()=>filterRecipes(search.value)
  app.appendChild(search)

  displayRecipes(loadedData)
}

function filterRecipes(text){
  const filtered=loadedData.filter(r=>
    r["name_"+currentLanguage].toLowerCase().includes(text.toLowerCase())
  )
  displayRecipes(filtered)
}

function displayRecipes(data){
  const app=document.getElementById("app")
  data.forEach(recipe=>{
    const div=document.createElement("div")
    div.className="card"
    div.innerText=recipe["name_"+currentLanguage]
    div.onclick=()=>showRecipe(recipe)
    app.appendChild(div)
  })
}

/* ===== RECIPE VIEW ===== */

function showRecipe(recipe){
  currentRecipe=recipe
  currentView="recipe"
  scaleMultiplier=1

  const app=document.getElementById("app")
  app.innerHTML=""

  const back=document.createElement("div")
  back.className="back-btn"
  back.innerText="←"
  back.onclick=renderRecipeList
  app.appendChild(back)

  const title=document.createElement("div")
  title.className="recipe-title"
  title.innerText=recipe["name_"+currentLanguage]
  app.appendChild(title)

  addSection("Yield",recipe["yield_"+currentLanguage])
  addSection("Time",recipe["time_"+currentLanguage])
  addSection("Holding",recipe["holding_"+currentLanguage])

  renderIngredients(recipe)

  addListSection("Procedure",recipe["procedure_detailed_"+currentLanguage])

  addScaleControls(recipe)

  const printBtn=document.createElement("button")
  printBtn.className="print-btn"
  printBtn.innerText=currentLanguage==="en"?"Print Recipe":"Imprimir Receta"
  printBtn.onclick=()=>window.print()
  app.appendChild(printBtn)
}

function renderIngredients(recipe){
  const app=document.getElementById("app")

  const section=document.createElement("div")
  section.className="section-title"
  section.innerText=currentLanguage==="en"?"Ingredients":"Ingredientes"
  app.appendChild(section)

  const ul=document.createElement("ul")
  recipe["ingredients_"+currentLanguage].forEach(item=>{
    const li=document.createElement("li")
    li.innerText=item+"  x"+scaleMultiplier
    ul.appendChild(li)
  })
  app.appendChild(ul)
}

function addScaleControls(recipe){
  const app=document.getElementById("app")
  const div=document.createElement("div")
  div.className="scale-controls"

  div.innerHTML=`
    <strong>${currentLanguage==="en"?"Scale Recipe":"Escalar Receta"}:</strong><br>
    <button onclick="scale(0.5)">0.5x</button>
    <button onclick="scale(2)">2x</button>
    <button onclick="scale(3)">3x</button>
    <input type="number" id="customScale" placeholder="x">
    <button onclick="customScale()">Go</button>
  `

  app.appendChild(div)
}

function scale(mult){
  scaleMultiplier=mult
  showRecipe(currentRecipe)
}

function customScale(){
  const val=document.getElementById("customScale").value
  if(val>0){
    scaleMultiplier=parseFloat(val)
    showRecipe(currentRecipe)
  }
}

/* ===== HELPERS ===== */

function addSection(title,content){
  if(!content) return
  const app=document.getElementById("app")
  const sec=document.createElement("div")
  sec.className="section-title"
  sec.innerText=currentLanguage==="en"?title:
    title==="Yield"?"Rinde":
    title==="Time"?"Tiempo":
    title==="Holding"?"Conservación":title
  app.appendChild(sec)

  const p=document.createElement("div")
  p.innerText=content
  app.appendChild(p)
}

function addListSection(title,items){
  if(!items) return
  const app=document.getElementById("app")
  const sec=document.createElement("div")
  sec.className="section-title"
  sec.innerText=currentLanguage==="en"?title:"Procedimiento"
  app.appendChild(sec)

  const ul=document.createElement("ul")
  items.forEach(item=>{
    const li=document.createElement("li")
    li.innerText=item
    ul.appendChild(li)
  })
  app.appendChild(ul)
}

/* ===== INIT ===== */

renderCategories()

</script>

</body>
</html>
