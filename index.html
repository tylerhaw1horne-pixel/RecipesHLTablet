<script>

/* ========= LANGUAGE ========= */

let language="en"

/* ========= DATA SAFETY ========= */

if(typeof BRUNCH_DATA==="undefined") window.BRUNCH_DATA=[]
if(typeof DESSERT_DATA==="undefined") window.DESSERT_DATA=[]
if(typeof PREP_DATA==="undefined") window.PREP_DATA=[]
if(typeof SIDES_DATA==="undefined") window.SIDES_DATA=[]
if(typeof SAUCES_DATA==="undefined") window.SAUCES_DATA=[]

const STORE={
  "Brunch": BRUNCH_DATA,
  "Desserts": DESSERT_DATA,
  "Prep": PREP_DATA,
  "Sides": SIDES_DATA,
  "Sauces": SAUCES_DATA
}

/* ========= STATE ========= */

let currentCategory=null
let currentRecipe=null

/* ========= HOME ========= */

function renderHome(){
  currentCategory=null
  currentRecipe=null
  const app=document.getElementById("app")
  app.innerHTML=""

  const search=document.createElement("input")
  search.className="search"
  search.placeholder="Search Recipes..."
  search.oninput=()=>renderSearch(search.value)
  app.appendChild(search)

  const grid=document.createElement("div")
  grid.className="grid"

  Object.keys(STORE).forEach(cat=>{
    if(!STORE[cat] || STORE[cat].length===0) return

    const card=document.createElement("div")
    card.className="card"
    card.innerText=cat
    card.onclick=()=>renderCategory(cat)
    grid.appendChild(card)
  })

  app.appendChild(grid)
}

/* ========= SEARCH ========= */

function renderSearch(text){
  const app=document.getElementById("app")
  app.innerHTML=""

  const search=document.createElement("input")
  search.className="search"
  search.value=text
  search.oninput=()=>renderSearch(search.value)
  app.appendChild(search)

  const grid=document.createElement("div")
  grid.className="grid"

  Object.keys(STORE).forEach(cat=>{
    STORE[cat].forEach(r=>{
      const name=r["name_"+language]
      if(name && name.toLowerCase().includes(text.toLowerCase())){
        const card=document.createElement("div")
        card.className="card"
        card.innerText=name
        card.onclick=()=>renderRecipe(cat,r)
        grid.appendChild(card)
      }
    })
  })

  app.appendChild(grid)
}

/* ========= CATEGORY ========= */

function renderCategory(cat){
  currentCategory=cat
  const app=document.getElementById("app")
  app.innerHTML=""

  const back=document.createElement("div")
  back.className="back"
  back.innerText="← Back"
  back.onclick=renderHome
  app.appendChild(back)

  const grid=document.createElement("div")
  grid.className="grid"

  STORE[cat].forEach(r=>{
    const card=document.createElement("div")
    card.className="card"
    card.innerText=r["name_"+language]
    card.onclick=()=>renderRecipe(cat,r)
    grid.appendChild(card)
  })

  app.appendChild(grid)
}

/* ========= RECIPE ========= */

function renderRecipe(cat,recipe){
  currentCategory=cat
  currentRecipe=recipe

  const app=document.getElementById("app")
  app.innerHTML=""

  const back=document.createElement("div")
  back.className="back"
  back.innerText="← Back"
  back.onclick=()=>renderCategory(cat)
  app.appendChild(back)

  const page=document.createElement("div")
  page.className="recipe-page"

  page.innerHTML=`
    <div class="recipe-title">${recipe["name_"+language]}</div>
    <div class="meta">
      ${recipe["yield_"+language]} | ${recipe["time_"+language]}
    </div>

    ${recipe.image ? `<img src="${recipe.image}" style="max-width:100%;border-radius:12px;margin-bottom:30px;">`:""}

    <div class="columns">
      <div style="flex:1">
        <div class="section-title">Ingredients</div>
        <ul>
          ${(recipe["ingredients_"+language]||[])
            .map(i=>"<li>"+i+"</li>").join("")}
        </ul>
      </div>
      <div style="flex:1">
        <div class="section-title">Procedure</div>
        <ol>
          ${(recipe["procedure_detailed_"+language]||[])
            .map(p=>"<li>"+p+"</li>").join("")}
        </ol>
      </div>
    </div>
  `

  app.appendChild(page)
}

/* ========= LANGUAGE TOGGLE ========= */

document.getElementById("langBtn").onclick=()=>{
  language=language==="en"?"es":"en"

  if(currentRecipe) renderRecipe(currentCategory,currentRecipe)
  else if(currentCategory) renderCategory(currentCategory)
  else renderHome()
}

/* ========= START ========= */

renderHome()

</script>
