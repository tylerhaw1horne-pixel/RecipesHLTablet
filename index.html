<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Huey Luey’s Kitchen</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:#f8fafc;
  color:#111;
}

body.kitchen-mode{
  background:white;
  color:black;
  font-size:20px;
}

header{
  background:#f37021;
  color:white;
  padding:14px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:600;
}

.header-controls button{
  background:white;
  color:#f37021;
  border:none;
  padding:6px 10px;
  margin-left:8px;
  border-radius:6px;
  font-weight:600;
  cursor:pointer;
}

.container{
  padding:20px;
  max-width:900px;
  margin:auto;
}

.card{
  background:white;
  padding:18px;
  margin:12px 0;
  border-radius:12px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
  cursor:pointer;
}

.back-btn{
  background:#1e7f3f;
  color:white;
  padding:8px 14px;
  border-radius:8px;
  display:inline-block;
  margin-bottom:15px;
  cursor:pointer;
}

.section-title{
  font-weight:700;
  margin-top:20px;
  color:#f37021;
}

.search{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
  margin-bottom:15px;
}

.scale-controls button{
  margin-right:5px;
}

input, textarea{
  width:100%;
  padding:8px;
  margin-bottom:8px;
}

@media print {
  header, .back-btn, .search, .scale-controls, .edit-btn {
    display:none;
  }
}
</style>
</head>

<body>

<header>
  Huey Luey’s Kitchen
  <div class="header-controls">
    <button id="langBtn">ES</button>
    <button id="kitchenBtn">Kitchen</button>
    <button id="editBtn">Edit</button>
  </div>
</header>

<div class="container" id="app"></div>

<script>

/* ================= STATE ================= */

let currentLanguage="en"
let currentView="categories"
let currentCategory=null
let currentRecipe=null
let loadedData=[]
let scaleMultiplier=1
let editUnlocked=false
const PASSWORD="hueys2026"

/* ================= CATEGORIES ================= */

const categories=[
  {name_en:"Items & Sides",name_es:"Acompañamientos",file:"items_sides.json"},
  {name_en:"Dressings",name_es:"Aderezos",file:"dressings.json"},
  {name_en:"Sauces & Spices",name_es:"Salsas y Especias",file:"sauces_spices.json"},
  {name_en:"Food Prepped",name_es:"Producción",file:"food_prepped.json"},
  {name_en:"Desserts",name_es:"Postres",file:"desserts.json"},
  {name_en:"Brunch",name_es:"Brunch",file:"brunch.json"}
]

/* ================= TOGGLES ================= */

document.getElementById("langBtn").onclick=()=>{
  currentLanguage=currentLanguage==="en"?"es":"en"
  document.getElementById("langBtn").innerText=currentLanguage==="en"?"ES":"EN"
  refreshView()
}

document.getElementById("kitchenBtn").onclick=()=>{
  document.body.classList.toggle("kitchen-mode")
}

document.getElementById("editBtn").onclick=()=>{
  if(editUnlocked){
    editUnlocked=false
    alert("Edit Locked")
  } else {
    const input=prompt("Password")
    if(input===PASSWORD){
      editUnlocked=true
      alert("Edit Mode Enabled")
    }
  }
}

/* ================= VIEW CONTROL ================= */

function refreshView(){
  if(currentView==="categories") renderCategories()
  if(currentView==="recipe") showRecipe(currentRecipe)
}

/* ================= CATEGORY PAGE ================= */

function renderCategories(){
  currentView="categories"
  const app=document.getElementById("app")
  app.innerHTML=""

  const search=document.createElement("input")
  search.className="search"
  search.placeholder=currentLanguage==="en"?"Search All Recipes":"Buscar Recetas"
  search.oninput=()=>searchAll(search.value)
  app.appendChild(search)

  categories.forEach(cat=>{
    const div=document.createElement("div")
    div.className="card"
    div.innerText=cat["name_"+currentLanguage]
    div.onclick=()=>loadCategory(cat)
    app.appendChild(div)
  })
}

/* ================= SEARCH GLOBAL ================= */

async function searchAll(text){
  if(text.length<2){ renderCategories(); return }
  const app=document.getElementById("app")
  app.innerHTML=""

  for(const cat of categories){
    const res=await fetch(cat.file)
    const data=await res.json()
    const filtered=data.filter(r=>
      r["name_"+currentLanguage].toLowerCase().includes(text.toLowerCase())
    )
    filtered.forEach(r=>{
      const div=document.createElement("div")
      div.className="card"
      div.innerText=r["name_"+currentLanguage]
      div.onclick=()=>{
        currentCategory=cat
        loadedData=data
        showRecipe(r)
      }
      app.appendChild(div)
    })
  }
}

/* ================= LOAD CATEGORY ================= */

async function loadCategory(category){
  currentCategory=category
  const res=await fetch(category.file)
  const original=await res.json()
  const stored=localStorage.getItem(category.file)
  loadedData=stored?JSON.parse(stored):original
  renderCategoryRecipes()
}

function renderCategoryRecipes(){
  const app=document.getElementById("app")
  app.innerHTML=""

  const back=document.createElement("div")
  back.className="back-btn"
  back.innerText="←"
  back.onclick=renderCategories
  app.appendChild(back)

  loadedData.forEach(recipe=>{
    const div=document.createElement("div")
    div.className="card"
    div.innerText=recipe["name_"+currentLanguage]
    div.onclick=()=>showRecipe(recipe)
    app.appendChild(div)
  })

  if(editUnlocked){
    const addBtn=document.createElement("div")
    addBtn.className="card"
    addBtn.innerText="+ Add New Recipe"
    addBtn.onclick=addNewRecipe
    app.appendChild(addBtn)
  }
}

/* ================= RECIPE VIEW ================= */

function showRecipe(recipe){
  currentView="recipe"
  currentRecipe=recipe
  scaleMultiplier=1

  const app=document.getElementById("app")
  app.innerHTML=""

  const back=document.createElement("div")
  back.className="back-btn"
  back.innerText="←"
  back.onclick=renderCategoryRecipes
  app.appendChild(back)

  const title=document.createElement("h2")
  title.innerText=recipe["name_"+currentLanguage]
  app.appendChild(title)

  renderIngredients(recipe)

  if(editUnlocked){
    const edit=document.createElement("button")
    edit.innerText="Edit Recipe"
    edit.onclick=()=>editRecipe(recipe)
    app.appendChild(edit)
  }
}

/* ================= SCALING ================= */

function renderIngredients(recipe){
  const app=document.getElementById("app")

  const section=document.createElement("div")
  section.className="section-title"
  section.innerText=currentLanguage==="en"?"Ingredients":"Ingredientes"
  app.appendChild(section)

  const ul=document.createElement("ul")

  recipe["ingredients_"+currentLanguage].forEach(line=>{
    ul.appendChild(createScaledItem(line))
  })

  app.appendChild(ul)

  const scaleDiv=document.createElement("div")
  scaleDiv.className="scale-controls"
  scaleDiv.innerHTML=`
    <button onclick="setScale(0.5)">0.5x</button>
    <button onclick="setScale(2)">2x</button>
    <button onclick="setScale(3)">3x</button>
    <input id="customScale" type="number" step="0.1" placeholder="x">
    <button onclick="customScale()">Go</button>
  `
  app.appendChild(scaleDiv)
}

function createScaledItem(line){
  const li=document.createElement("li")
  const match=line.match(/(.*?–\s*)([\d.]+)/)
  if(match){
    const base=parseFloat(match[2])
    const scaled=(base*scaleMultiplier).toFixed(2).replace(/\.00$/,'')
    li.innerText=line.replace(match[2],scaled)
  } else {
    li.innerText=line
  }
  return li
}

function setScale(mult){
  scaleMultiplier=mult
  showRecipe(currentRecipe)
}

function customScale(){
  const val=parseFloat(document.getElementById("customScale").value)
  if(val>0){
    scaleMultiplier=val
    showRecipe(currentRecipe)
  }
}

/* ================= EDIT ================= */

function editRecipe(recipe){
  const name=prompt("Name EN",recipe.name_en)
  if(name) recipe.name_en=name
  localStorage.setItem(currentCategory.file,JSON.stringify(loadedData))
  showRecipe(recipe)
}

function addNewRecipe(){
  const name=prompt("Recipe Name")
  if(!name) return
  const newRecipe={
    name_en:name,
    name_es:name,
    ingredients_en:["Ingredient – 1 cup"],
    ingredients_es:["Ingrediente – 1 taza"]
  }
  loadedData.push(newRecipe)
  localStorage.setItem(currentCategory.file,JSON.stringify(loadedData))
  renderCategoryRecipes()
}

/* ================= INIT ================= */

renderCategories()

</script>

</body>
</html>
