<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Huey Luey’s Recipe Hub</title>

<style>

body{
  margin:0;
  font-family:Garamond, serif;
  background:#f5f5f5;
  color:#111;
}

header{
  background:#f37021;
  color:white;
  padding:14px 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:bold;
}

header button{
  background:white;
  color:#f37021;
  border:none;
  padding:6px 10px;
  margin-left:8px;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.container{
  max-width:850px;
  margin:30px auto;
  padding:20px;
}

.card{
  background:white;
  padding:20px;
  margin-bottom:14px;
  border-radius:8px;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
  cursor:pointer;
  transition:.2s;
}

.card:hover{
  transform:translateY(-3px);
}

.search{
  width:100%;
  padding:10px;
  border:1px solid #ccc;
  margin-bottom:18px;
  font-size:16px;
}

.recipe-page{
  background:white;
  padding:40px;
  border-radius:10px;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.recipe-title{
  text-align:center;
  font-size:34px;
  font-weight:bold;
}

.divider{
  text-align:center;
  margin:15px 0;
  letter-spacing:2px;
}

.photo{
  text-align:center;
  margin:20px 0;
}

.photo img{
  max-width:100%;
  border-radius:8px;
}

.columns{
  display:flex;
  gap:40px;
}

.col{
  flex:1;
}

.section-title{
  font-weight:bold;
  border-bottom:2px solid #f37021;
  padding-bottom:5px;
  margin-top:20px;
}

.scale-controls{
  margin-top:20px;
}

.scale-controls button{
  margin-right:6px;
}

.back{
  cursor:pointer;
  margin-bottom:20px;
  display:inline-block;
  font-weight:bold;
  color:#1e7f3f;
}

.edit-panel{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.6);
  display:flex;
  justify-content:center;
  align-items:center;
}

.edit-box{
  background:white;
  padding:20px;
  width:90%;
  max-width:500px;
  border-radius:10px;
}

.edit-box input, .edit-box textarea{
  width:100%;
  margin-bottom:10px;
  padding:8px;
}

</style>
</head>
<body>

<header>
  Huey Luey’s Recipe Hub
  <div>
    <button id="langBtn">ES</button>
    <button id="editBtn">Edit</button>
  </div>
</header>

<div class="container" id="app"></div>

<script>

let language="en"
let currentCategory=null
let currentRecipe=null
let scaleFactor=1
let editMode=false
const PASSWORD="hueys2026"

const categories=[
  {en:"Items & Sides",es:"Acompañamientos"},
  {en:"Desserts",es:"Postres"},
  {en:"Brunch",es:"Brunch"}
]

let recipes={
  "Items & Sides":[
    {
      name_en:"Pico de Gallo",
      name_es:"Pico de Gallo",
      ingredients_en:["Diced Tomato – 20 lbs","Onion – 6 lbs"],
      ingredients_es:["Tomate picado – 20 lbs","Cebolla – 6 lbs"],
      procedure_en:["Mix ingredients gently."],
      procedure_es:["Mezclar suavemente."]
    }
  ]
}

/* ===== NAV ===== */

function renderCategories(){
  currentRecipe=null
  const app=document.getElementById("app")
  app.innerHTML=""

  const search=document.createElement("input")
  search.className="search"
  search.placeholder=language==="en"?"Search Recipes":"Buscar Recetas"
  search.oninput=()=>filterRecipes(search.value)
  app.appendChild(search)

  categories.forEach(cat=>{
    const div=document.createElement("div")
    div.className="card"
    div.innerText=language==="en"?cat.en:cat.es
    div.onclick=()=>openCategory(cat.en)
    app.appendChild(div)
  })
}

function openCategory(name){
  currentCategory=name
  const app=document.getElementById("app")
  app.innerHTML=""

  const back=document.createElement("div")
  back.className="back"
  back.innerText="← Back"
  back.onclick=renderCategories
  app.appendChild(back)

  recipes[name].forEach(r=>{
    const div=document.createElement("div")
    div.className="card"
    div.innerText=r["name_"+language]
    div.onclick=()=>openRecipe(r)
    app.appendChild(div)
  })
}

/* ===== RECIPE VIEW ===== */

function openRecipe(recipe){
  currentRecipe=recipe
  scaleFactor=1

  const app=document.getElementById("app")
  app.innerHTML=""

  const back=document.createElement("div")
  back.className="back"
  back.innerText="← Back"
  back.onclick=()=>openCategory(currentCategory)
  app.appendChild(back)

  const page=document.createElement("div")
  page.className="recipe-page"

  page.innerHTML=`
    <div class="recipe-title">${recipe["name_"+language]}</div>
    <div class="divider">────────────</div>
    <div class="photo"><img id="recipeImg" src="" /></div>

    <div class="columns">
      <div class="col">
        <div class="section-title">${language==="en"?"INGREDIENTS":"INGREDIENTES"}</div>
        <ul id="ingList"></ul>
      </div>
      <div class="col">
        <div class="section-title">${language==="en"?"PROCEDURE":"PROCEDIMIENTO"}</div>
        <ol id="procList"></ol>
      </div>
    </div>

    <div class="scale-controls">
      <button onclick="setScale(.5)">0.5x</button>
      <button onclick="setScale(2)">2x</button>
      <button onclick="setScale(3)">3x</button>
      <input type="number" id="customScale" placeholder="x">
      <button onclick="customScale()">Apply</button>
    </div>
  `

  app.appendChild(page)

  renderScaled()
}

function renderScaled(){
  const ingList=document.getElementById("ingList")
  const procList=document.getElementById("procList")

  ingList.innerHTML=""
  procList.innerHTML=""

  currentRecipe["ingredients_"+language].forEach(i=>{
    const li=document.createElement("li")
    li.innerText=scaleLine(i)
    ingList.appendChild(li)
  })

  currentRecipe["procedure_"+language].forEach(p=>{
    const li=document.createElement("li")
    li.innerText=p
    procList.appendChild(li)
  })
}

function scaleLine(text){
  const match=text.match(/(.*?–\s*)([\d.]+)/)
  if(!match) return text
  const num=parseFloat(match[2])
  const scaled=(num*scaleFactor).toFixed(2).replace(/\.00$/,'')
  return text.replace(match[2],scaled)
}

function setScale(f){
  scaleFactor=f
  renderScaled()
}

function customScale(){
  const val=parseFloat(document.getElementById("customScale").value)
  if(val>0){scaleFactor=val;renderScaled()}
}

/* ===== TOGGLES ===== */

document.getElementById("langBtn").onclick=()=>{
  language=language==="en"?"es":"en"
  document.getElementById("langBtn").innerText=language==="en"?"ES":"EN"
  if(currentRecipe) openRecipe(currentRecipe)
  else renderCategories()
}

document.getElementById("editBtn").onclick=()=>{
  if(editMode){editMode=false;alert("Edit Locked")}
  else{
    const p=prompt("Password?")
    if(p===PASSWORD){editMode=true;alert("Edit Enabled")}
  }
}

/* ===== START ===== */

renderCategories()

</script>
</body>
</html>
