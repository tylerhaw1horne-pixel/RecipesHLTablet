<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Huey Luey’s Kitchen Pro</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#ffffff;
  color:#111;
}

header{
  background:#f37021;
  color:white;
  padding:18px;
  font-size:20px;
  font-weight:bold;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.header-right button{
  margin-left:10px;
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.container{
  padding:20px;
}

button{
  width:100%;
  padding:18px;
  margin:10px 0;
  font-size:18px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#e5e5e5;
}

button:hover{
  background:#d4d4d4;
}

.back-btn{
  background:#1e7f3f;
  color:white;
}

.recipe-title{
  font-size:26px;
  font-weight:bold;
  margin-bottom:10px;
}

.section-title{
  font-weight:bold;
  margin-top:20px;
}

ul{
  padding-left:20px;
}

img{
  width:100%;
  border-radius:8px;
  margin-top:15px;
}

input, textarea{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:1px solid #ccc;
  border-radius:6px;
}

.search{
  padding:12px;
  font-size:16px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<header>
  Huey Luey’s Kitchen Pro
  <div class="header-right">
    <button onclick="toggleLanguage()">EN/ES</button>
    <button onclick="unlockEdit()">Edit</button>
  </div>
</header>

<div class="container" id="app"></div>

<script>

let currentLanguage = "en"
let editMode = false
let historyStack = []
let currentCategoryFile = ""
let loadedData = []

const PASSWORD = "hueys2026"  // change this

const categories = [
  {name:"Items & Sides", file:"items_sides.json"},
  {name:"Dressings", file:"dressings.json"},
  {name:"Sauces & Spices", file:"sauces_spices.json"},
  {name:"Food Prepped", file:"food_prepped.json"},
  {name:"Desserts", file:"desserts.json"},
  {name:"Brunch", file:"brunch.json"}
]

function toggleLanguage(){
  currentLanguage = currentLanguage === "en" ? "es" : "en"
  renderCategories()
}

function unlockEdit(){
  const input = prompt("Enter password")
  if(input === PASSWORD){
    editMode = true
    alert("Edit Mode Enabled")
  } else {
    alert("Wrong password")
  }
}

function renderCategories(){
  const app = document.getElementById("app")
  app.innerHTML = ""
  historyStack = []

  categories.forEach(cat=>{
    const btn = document.createElement("button")
    btn.innerText = cat.name
    btn.onclick = ()=> loadCategory(cat)
    app.appendChild(btn)
  })
}

async function loadCategory(category){
  currentCategoryFile = category.file
  historyStack.push(renderCategories)

  const response = await fetch(category.file)
  const originalData = await response.json()

  const stored = localStorage.getItem(category.file)
  loadedData = stored ? JSON.parse(stored) : originalData

  const app = document.getElementById("app")
  app.innerHTML = ""

  const back = document.createElement("button")
  back.className = "back-btn"
  back.innerText = "← Back"
  back.onclick = ()=> goBack()
  app.appendChild(back)

  const search = document.createElement("input")
  search.className = "search"
  search.placeholder = "Search..."
  search.oninput = ()=> renderRecipeList(search.value)
  app.appendChild(search)

  renderRecipeList("")
}

function renderRecipeList(filter){
  const app = document.getElementById("app")

  const oldButtons = Array.from(app.querySelectorAll(".recipe-btn"))
  oldButtons.forEach(btn=>btn.remove())

  loadedData
    .filter(r => r["name_"+currentLanguage].toLowerCase().includes(filter.toLowerCase()))
    .forEach(recipe=>{
      const btn = document.createElement("button")
      btn.className = "recipe-btn"
      btn.innerText = recipe["name_"+currentLanguage]
      btn.onclick = ()=> showRecipe(recipe)
      app.appendChild(btn)
    })
}

function showRecipe(recipe){
  historyStack.push(()=> loadCategory({file:currentCategoryFile}))

  const app = document.getElementById("app")
  app.innerHTML = ""

  const back = document.createElement("button")
  back.className = "back-btn"
  back.innerText = "← Back"
  back.onclick = ()=> goBack()
  app.appendChild(back)

  const title = document.createElement("div")
  title.className = "recipe-title"
  title.innerText = recipe["name_"+currentLanguage]
  app.appendChild(title)

  if(recipe.image){
    const img = document.createElement("img")
    img.src = recipe.image
    app.appendChild(img)
  }

  addSection("Yield", recipe["yield_"+currentLanguage])
  addSection("Time", recipe["time_"+currentLanguage])
  addSection("Holding", recipe["holding_"+currentLanguage])
  addListSection("Ingredients", recipe["ingredients_"+currentLanguage])
  addListSection("Procedure", recipe["procedure_detailed_"+currentLanguage])

  if(editMode){
    addEditForm(recipe)
  }
}

function addEditForm(recipe){
  const app = document.getElementById("app")

  const hr = document.createElement("hr")
  app.appendChild(hr)

  const title = document.createElement("div")
  title.className = "section-title"
  title.innerText = "Edit Recipe"
  app.appendChild(title)

  const nameInput = createInput("Name EN", recipe.name_en)
  const yieldInput = createInput("Yield EN", recipe.yield_en)
  const timeInput = createInput("Time EN", recipe.time_en)
  const holdingInput = createInput("Holding EN", recipe.holding_en)

  const imageInput = document.createElement("input")
  imageInput.type = "file"
  imageInput.accept = "image/*"

  imageInput.onchange = e=>{
    const reader = new FileReader()
    reader.onload = function(event){
      recipe.image = event.target.result
    }
    reader.readAsDataURL(e.target.files[0])
  }

  const saveBtn = document.createElement("button")
  saveBtn.innerText = "Save Changes"
  saveBtn.onclick = ()=>{
    recipe.name_en = nameInput.value
    recipe.yield_en = yieldInput.value
    recipe.time_en = timeInput.value
    recipe.holding_en = holdingInput.value

    localStorage.setItem(currentCategoryFile, JSON.stringify(loadedData))
    alert("Saved")
  }

  app.appendChild(nameInput)
  app.appendChild(yieldInput)
  app.appendChild(timeInput)
  app.appendChild(holdingInput)
  app.appendChild(imageInput)
  app.appendChild(saveBtn)
}

function createInput(label,value){
  const input = document.createElement("input")
  input.placeholder = label
  input.value = value || ""
  return input
}

function addSection(title, content){
  if(!content) return
  const app = document.getElementById("app")
  const sectionTitle = document.createElement("div")
  sectionTitle.className = "section-title"
  sectionTitle.innerText = title
  app.appendChild(sectionTitle)

  const p = document.createElement("div")
  p.innerText = content
  app.appendChild(p)
}

function addListSection(title, items){
  if(!items) return
  const app = document.getElementById("app")
  const sectionTitle = document.createElement("div")
  sectionTitle.className = "section-title"
  sectionTitle.innerText = title
  app.appendChild(sectionTitle)

  const ul = document.createElement("ul")
  items.forEach(item=>{
    const li = document.createElement("li")
    li.innerText = item
    ul.appendChild(li)
  })
  app.appendChild(ul)
}

function goBack(){
  const last = historyStack.pop()
  if(last) last()
}

renderCategories()
</script>

</body>
</html>
