<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Huey Luey’s Recipe Tablet</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');

:root{
  --orange:#f37021;
  --green:#2e6b3a;
  --light:#ffffff;
  --soft:#f5f5f5;
  --border:#e5e5e5;
}

body{
  margin:0;
  background:white;
  font-family:'Poppins', sans-serif;
  color:#1e1e1e;
}

/* ===== FRAME ===== */

.frame{
  border:6px solid var(--green);
  min-height:100vh;
  box-sizing:border-box;
}

/* ===== HEADER ===== */

header{
  padding:20px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:4px solid var(--orange);
}

header h1{
  margin:0;
  font-size:20px;
  font-weight:800;
  letter-spacing:1px;
  color:var(--green);
  text-transform:uppercase;
}

button{
  background:var(--orange);
  color:white;
  border:none;
  padding:8px 18px;
  font-weight:600;
  border-radius:6px;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 14px rgba(0,0,0,.15);
}

/* ===== MAIN ===== */

#app{
  max-width:1000px;
  margin:40px auto;
  padding:0 35px 60px 35px;
}

/* ===== SEARCH ===== */

.search-wrapper{
  position:relative;
  margin-bottom:25px;
}

.search{
  width:100%;
  padding:12px 16px;
  border:2px solid var(--border);
  border-radius:8px;
  font-size:14px;
  outline:none;
  transition:.2s;
}

.search:focus{
  border-color:var(--orange);
  box-shadow:0 0 0 3px rgba(243,112,33,.15);
}

.dropdown{
  position:absolute;
  width:100%;
  background:white;
  border:1px solid var(--border);
  border-radius:8px;
  max-height:240px;
  overflow-y:auto;
  display:none;
  z-index:10;
  box-shadow:0 12px 30px rgba(0,0,0,.08);
  animation:fadeIn .2s ease-out;
}

.dropdown div{
  padding:10px 16px;
  cursor:pointer;
  font-size:14px;
}

.dropdown div:hover{
  background:#fff4ec;
}

/* ===== CATEGORY GRID ===== */

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(210px,1fr));
  gap:18px;
}

.card{
  background:var(--soft);
  border:2px solid var(--border);
  padding:20px;
  text-align:center;
  font-weight:700;
  border-radius:10px;
  cursor:pointer;
  transition:.2s;
  font-size:14px;
}

.card:hover{
  border-color:var(--orange);
  background:#fff3ea;
  transform:translateY(-3px);
  box-shadow:0 10px 25px rgba(0,0,0,.08);
}

/* ===== BACK ===== */

.back{
  color:var(--orange);
  font-weight:700;
  margin-bottom:20px;
  cursor:pointer;
  font-size:14px;
}

/* ===== RECIPE CARD ===== */

.recipe-card{
  background:white;
  border:3px solid var(--green);
  border-radius:16px;
  padding:35px 40px;
  box-shadow:0 15px 40px rgba(0,0,0,.07);
  animation:fadeUp .3s ease-out;
}

/* ===== TITLE ===== */

.recipe-title{
  text-align:center;
  font-size:30px;
  font-weight:800;
  color:var(--green);
  margin-bottom:6px;
}

.orange-line{
  width:70px;
  height:4px;
  background:var(--orange);
  margin:0 auto 20px auto;
  border-radius:2px;
}

/* ===== IMAGE BLOCK ===== */

.recipe-image{
  width:100%;
  max-height:350px;
  object-fit:cover;
  border-radius:14px;
  margin-bottom:25px;
  box-shadow:0 12px 25px rgba(0,0,0,.15);
}

/* ===== META ===== */

.meta-box{
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
  margin-bottom:30px;
}

.meta-item{
  background:var(--soft);
  padding:10px 18px;
  border-radius:25px;
  font-size:12px;
  font-weight:600;
  border:2px solid var(--border);
}

/* ===== CONTENT ===== */

.columns{
  display:flex;
  gap:40px;
  flex-wrap:wrap;
}

.section-header{
  font-weight:800;
  font-size:14px;
  margin-bottom:12px;
  color:var(--green);
  border-bottom:3px solid var(--orange);
  padding-bottom:5px;
}

ul, ol{
  padding-left:18px;
  line-height:1.6;
  font-size:13px;
  margin:0;
}

li{
  margin-bottom:6px;
}

/* ===== PLATING BOX ===== */

.plating-box{
  margin-top:35px;
  padding:18px 20px;
  background:#fff7f2;
  border-left:6px solid var(--orange);
  border-radius:8px;
}

.plating-box h3{
  margin-top:0;
  font-size:14px;
  font-weight:800;
  color:var(--green);
}

/* ===== ANIMATIONS ===== */

@keyframes fadeUp{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

/* ===== RESPONSIVE ===== */

@media(max-width:900px){
  #app{
    padding:0 20px 50px 20px;
  }
  .columns{
    flex-direction:column;
    gap:28px;
  }
  .recipe-title{
    font-size:24px;
  }
}
<script>

document.addEventListener("DOMContentLoaded", async function(){

let language="en"
let view="home"
let currentCategory=null
let currentRecipe=null
let RECIPES=[]

const files=[
  {file:"items_sides.json", key:"items"},
  {file:"sauces_spices.json", key:"sauces"},
  {file:"dressings.json", key:"dressings"},
  {file:"food_prepped.json", key:"prep"},
  {file:"desserts.json", key:"desserts"},
  {file:"brunch.json", key:"brunch"}
]

for(const f of files){
  try{
    const res=await fetch(f.file)
    const data=await res.json()
    data.forEach(r=>{
      r.category=f.key
      r.procedure_en=r.procedure_detailed_en
      r.procedure_es=r.procedure_detailed_es
    })
    RECIPES=RECIPES.concat(data)
  }catch(err){
    console.error("Error loading",f.file)
  }
}

const app=document.getElementById("app")

function getCategories(){
  return [...new Set(RECIPES.map(r=>r.category))]
}

function renderHome(){
  view="home"
  app.innerHTML=""
  app.appendChild(createSearch())

  const grid=document.createElement("div")
  grid.className="grid"

  getCategories().forEach(cat=>{
    const card=document.createElement("div")
    card.className="card"
    card.innerText=cat.toUpperCase()
    card.onclick=()=>renderCategory(cat)
    grid.appendChild(card)
  })

  app.appendChild(grid)
}

function renderCategory(cat){
  view="category"
  currentCategory=cat
  app.innerHTML=""

  const back=document.createElement("div")
  back.className="back"
  back.innerText="← Back"
  back.onclick=renderHome
  app.appendChild(back)

  app.appendChild(createSearch())

  const grid=document.createElement("div")
  grid.className="grid"

  RECIPES.filter(r=>r.category===cat)
    .forEach(r=>{
      const card=document.createElement("div")
      card.className="card"
      card.innerText=r["name_"+language]
      card.onclick=()=>renderRecipe(r)
      grid.appendChild(card)
    })

  app.appendChild(grid)
}

function renderRecipe(recipe){
  view="recipe"
  currentRecipe=recipe
  app.innerHTML=""

  const back=document.createElement("div")
  back.className="back"
  back.innerText="← Back"
  back.onclick=()=>renderCategory(recipe.category)
  app.appendChild(back)

  const card=document.createElement("div")
  card.className="recipe-card"

  card.innerHTML=`
  <div class="recipe-title">${recipe["name_"+language]}</div>
  <div class="orange-line"></div>

  ${recipe.image ? `<img src="${recipe.image}" class="recipe-image">` : ""}

  <div class="meta-box">
    <div class="meta-item">${recipe["yield_"+language] || ""}</div>
    <div class="meta-item">${recipe["time_"+language] || ""}</div>
    <div class="meta-item">${recipe["holding_"+language] || ""}</div>
  </div>

  <div class="columns">
    <div style="flex:1">
      <div class="section-header">INGREDIENTS</div>
      <ul>${(recipe["ingredients_"+language]||[]).map(i=>"<li>"+i+"</li>").join("")}</ul>
    </div>
    <div style="flex:1">
      <div class="section-header">PROCEDURE</div>
      <ol>${(recipe["procedure_"+language]||[]).map(p=>"<li>"+p+"</li>").join("")}</ol>
    </div>
  </div>

  ${recipe.plating ? `
    <div class="plating-box">
      <h3>PLATING</h3>
      <p>${recipe["plating_"+language] || recipe.plating}</p>
    </div>
  ` : ""}
`

  app.appendChild(card)
}

function createSearch(){
  const wrapper=document.createElement("div")
  wrapper.className="search-wrapper"

  const input=document.createElement("input")
  input.className="search"
  input.placeholder="Search recipes..."

  const dropdown=document.createElement("div")
  dropdown.className="dropdown"

  input.oninput=()=>{
    const val=input.value.toLowerCase()
    dropdown.innerHTML=""
    if(!val){dropdown.style.display="none";return}

    const matches=RECIPES.filter(r =>
      r["name_"+language].toLowerCase().includes(val)
    )

    matches.forEach(r=>{
      const div=document.createElement("div")
      div.innerText=r["name_"+language]
      div.onclick=()=>renderRecipe(r)
      dropdown.appendChild(div)
    })

    dropdown.style.display=matches.length?"block":"none"
  }

  wrapper.appendChild(input)
  wrapper.appendChild(dropdown)
  return wrapper
}

document.getElementById("langBtn").onclick=function(){
  language=language==="en"?"es":"en"

  if(view==="home") renderHome()
  if(view==="category") renderCategory(currentCategory)
  if(view==="recipe") renderRecipe(currentRecipe)
}

renderHome()

})

</script>

</body>
</html>
