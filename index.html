<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Huey Luey’s Kitchen Recipe Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">

<style>

:root{
  --huey-green:#5DBB63;
  --huey-orange:#F97316;
  --bg:#ffffff;
  --text:#1f2937;
}

body{
  margin:0;
  font-family:'Outfit',sans-serif;
  background:var(--bg);
  color:var(--text);
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 24px;
  border-bottom:3px solid var(--huey-green);
}

.logo{
  font-weight:700;
  font-size:20px;
  color:var(--huey-green);
}

.controls{
  display:flex;
  gap:10px;
}

button{
  border:none;
  padding:8px 16px;
  border-radius:6px;
  font-weight:600;
  cursor:pointer;
}

.lang-btn{
  background:var(--huey-orange);
  color:white;
}

.back-btn{
  background:#e5e7eb;
}

.search{
  padding:8px 12px;
  border:1px solid #ddd;
  border-radius:6px;
  width:220px;
}

.container{
  padding:24px;
  max-width:1100px;
  margin:auto;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:16px;
}

.card{
  padding:18px;
  border-radius:10px;
  background:#f9fafb;
  border:2px solid transparent;
  font-weight:600;
  cursor:pointer;
  transition:.2s;
}

.card:hover{
  border-color:var(--huey-green);
  transform:translateY(-2px);
}

.recipe{
  background:#f9fafb;
  padding:20px;
  border-radius:10px;
}

.recipe h2{
  margin-top:0;
  color:var(--huey-green);
}

ul{
  padding-left:18px;
}

.hidden{display:none;}

</style>
</head>
<body>

<header>
  <div class="logo">Huey Luey’s Kitchen</div>
  <div class="controls">
    <input type="text" id="search" class="search" placeholder="Search ingredient...">
    <button class="lang-btn" onclick="toggleLang()">ES</button>
  </div>
</header>

<div class="container">

  <div id="categories" class="grid"></div>

  <div id="items" class="hidden">
    <button class="back-btn" onclick="backToCategories()">← Back</button>
    <div id="itemGrid" class="grid"></div>
  </div>

  <div id="recipeView" class="hidden">
    <button class="back-btn" onclick="backToItems()">← Back</button>
    <div id="recipeContent" class="recipe"></div>
  </div>

</div>

<script>

let currentLang="en";
let currentCategory="";
let currentItems=[];
let recipeData={};

const categories=[
  {name:"Items & Sides", file:"items_sides.json"},
  {name:"Sauces & Spices", file:"sauces_spices.json"},
  {name:"Dressings", file:"dressings.json"},
  {name:"Food Prepped", file:"food_prepped.json"},
  {name:"Desserts", file:"desserts.json"},
  {name:"Brunch", file:"brunch.json"}
];

const catDiv=document.getElementById("categories");
const itemsDiv=document.getElementById("items");
const recipeDiv=document.getElementById("recipeView");
const itemGrid=document.getElementById("itemGrid");
const recipeContent=document.getElementById("recipeContent");

function loadCategories(){
  categories.forEach(cat=>{
    const card=document.createElement("div");
    card.className="card";
    card.innerText=cat.name;
    card.onclick=()=>loadItems(cat);
    catDiv.appendChild(card);
  });
}

async function loadItems(cat){
  currentCategory=cat.name;
  const res=await fetch(cat.file);
  recipeData=await res.json();
  currentItems=recipeData;

  catDiv.classList.add("hidden");
  itemsDiv.classList.remove("hidden");
  itemGrid.innerHTML="";

  recipeData.forEach(r=>{
    const card=document.createElement("div");
    card.className="card";
    card.innerText=currentLang==="en"?r.name_en:r.name_es;
    card.onclick=()=>showRecipe(r);
    itemGrid.appendChild(card);
  });
}

function showRecipe(r){
  itemsDiv.classList.add("hidden");
  recipeDiv.classList.remove("hidden");

  const name=currentLang==="en"?r.name_en:r.name_es;
  const ingredients=currentLang==="en"?r.ingredients_en:r.ingredients_es;

  recipeContent.innerHTML=`
    <h2>${name}</h2>
    <ul>
      ${ingredients.map(i=>`<li>${i}</li>`).join("")}
    </ul>
  `;
}

function backToCategories(){
  itemsDiv.classList.add("hidden");
  recipeDiv.classList.add("hidden");
  catDiv.classList.remove("hidden");
}

function backToItems(){
  recipeDiv.classList.add("hidden");
  itemsDiv.classList.remove("hidden");
}

function toggleLang(){
  currentLang=currentLang==="en"?"es":"en";
  document.querySelector(".lang-btn").innerText=currentLang==="en"?"ES":"EN";
  backToCategories();
}

document.getElementById("search").addEventListener("input",function(){
  const value=this.value.toLowerCase();
  const filtered=currentItems.filter(r=>{
    const list=currentLang==="en"?r.ingredients_en:r.ingredients_es;
    return list.some(i=>i.toLowerCase().includes(value));
  });

  itemGrid.innerHTML="";
  filtered.forEach(r=>{
    const card=document.createElement("div");
    card.className="card";
    card.innerText=currentLang==="en"?r.name_en:r.name_es;
    card.onclick=()=>showRecipe(r);
    itemGrid.appendChild(card);
  });
});

loadCategories();

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
