<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Huey Luey’s Recipe Tablet</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --orange:#f37021;
  --green:#2e6b3a;
  --light:#ffffff;
  --soft:#f5f5f5;
  --border:#e5e5e5;
}

body{
  margin:0;
  background:white;
  font-family:'Poppins', sans-serif;
  color:#1e1e1e;
  font-size:16px;
}

/* FRAME */
.frame{
  border:6px solid var(--green);
  min-height:100vh;
  box-sizing:border-box;
}

/* HEADER */
header{
  padding:24px 50px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:5px solid var(--orange);
}

header h1{
  margin:0;
  font-size:22px;
  font-weight:800;
  letter-spacing:1px;
  color:var(--green);
  text-transform:uppercase;
}

button{
  background:var(--orange);
  color:white;
  border:none;
  padding:10px 20px;
  font-weight:600;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
}

/* MAIN */
#app{
  max-width:1100px;
  margin:50px auto;
  padding:0 40px 70px 40px;
}

/* SEARCH */
.search-wrapper{
  position:relative;
  margin-bottom:35px;
}

.search{
  width:100%;
  padding:16px 18px;
  border:2px solid var(--border);
  border-radius:10px;
  font-size:16px;
  outline:none;
}

.dropdown{
  position:absolute;
  width:100%;
  background:white;
  border:1px solid var(--border);
  border-radius:10px;
  max-height:260px;
  overflow-y:auto;
  display:none;
  z-index:10;
  box-shadow:0 12px 30px rgba(0,0,0,.08);
}

.dropdown div{
  padding:14px 18px;
  cursor:pointer;
  font-size:15px;
}

.dropdown div:hover{
  background:#fff4ec;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:24px;
}

.card{
  background:var(--soft);
  border:2px solid var(--border);
  padding:28px;
  text-align:center;
  font-weight:700;
  border-radius:14px;
  cursor:pointer;
  font-size:17px;
  transition:.2s;
}

.card:hover{
  border-color:var(--orange);
  background:#fff3ea;
  transform:translateY(-4px);
}

/* BACK */
.back{
  color:var(--orange);
  font-weight:700;
  margin-bottom:30px;
  cursor:pointer;
  font-size:16px;
}

/* RECIPE CARD */
.recipe-card{
  background:white;
  border:4px solid var(--green);
  border-radius:20px;
  padding:45px 55px;
  box-shadow:0 18px 45px rgba(0,0,0,.08);
}

.recipe-title{
  text-align:center;
  font-size:36px;
  font-weight:800;
  color:var(--green);
  margin-bottom:8px;
}

.orange-line{
  width:90px;
  height:5px;
  background:var(--orange);
  margin:0 auto 28px auto;
  border-radius:3px;
}

.recipe-image{
  width:100%;
  max-height:380px;
  object-fit:cover;
  border-radius:16px;
  margin-bottom:30px;
}

/* META */
.meta-box{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
  margin-bottom:40px;
}

.meta-item{
  background:var(--soft);
  padding:12px 22px;
  border-radius:30px;
  font-size:14px;
  font-weight:600;
  border:2px solid var(--border);
}

/* CONTENT */
.columns{
  display:flex;
  gap:60px;
  flex-wrap:wrap;
}

.section-header{
  font-weight:800;
  font-size:18px;
  margin-bottom:14px;
  color:var(--green);
  border-bottom:4px solid var(--orange);
  padding-bottom:6px;
}

ul, ol{
  padding-left:22px;
  line-height:1.8;
  font-size:16px;
}

li{
  margin-bottom:8px;
}

/* PLATING */
.plating-box{
  margin-top:45px;
  padding:25px 28px;
  background:#fff7f2;
  border-left:8px solid var(--orange);
  border-radius:10px;
  font-size:16px;
}

/* RESPONSIVE */
@media(max-width:900px){
  .recipe-card{
    padding:35px;
  }
  .columns{
    flex-direction:column;
    gap:40px;
  }
  .recipe-title{
    font-size:28px;
  }
}
</style>
</head>

<body>
<div class="frame">

<header>
  <h1>Huey Luey’s Recipe Tablet</h1>
  <button id="langBtn">ES</button>
</header>

<div id="app"></div>

</div>

<script>
document.addEventListener("DOMContentLoaded", async function(){

let language="en"
let view="home"
let currentCategory=null
let currentRecipe=null
let RECIPES=[]

const files=[
  {file:"items_sides.json", key:"items"},
  {file:"sauces_spices.json", key:"sauces"},
  {file:"dressings.json", key:"dressings"},
  {file:"food_prepped.json", key:"prep"},
  {file:"desserts.json", key:"desserts"},
  {file:"brunch.json", key:"brunch"}
]

for(const f of files){
  try{
    const res=await fetch(f.file)
    const data=await res.json()
    data.forEach(r=>{
      r.category=f.key
      r.procedure_en=r.procedure_detailed_en
      r.procedure_es=r.procedure_detailed_es
    })
    RECIPES=RECIPES.concat(data)
  }catch(err){
    console.error("Error loading",f.file)
  }
}

const app=document.getElementById("app")

function getCategories(){
  return [...new Set(RECIPES.map(r=>r.category))]
}

function renderHome(){
  view="home"
  app.innerHTML=""
  app.appendChild(createSearch())

  const grid=document.createElement("div")
  grid.className="grid"

  getCategories().forEach(cat=>{
    const card=document.createElement("div")
    card.className="card"
    card.innerText=cat.toUpperCase()
    card.onclick=()=>renderCategory(cat)
    grid.appendChild(card)
  })

  app.appendChild(grid)
}

function renderCategory(cat){
  view="category"
  currentCategory=cat
  app.innerHTML=""

  const back=document.createElement("div")
  back.className="back"
  back.innerText="← Back"
  back.onclick=renderHome
  app.appendChild(back)

  app.appendChild(createSearch())

  const grid=document.createElement("div")
  grid.className="grid"

  RECIPES.filter(r=>r.category===cat)
    .forEach(r=>{
      const card=document.createElement("div")
      card.className="card"
      card.innerText=r["name_"+language]
      card.onclick=()=>renderRecipe(r)
      grid.appendChild(card)
    })

  app.appendChild(grid)
}

function renderRecipe(recipe){
  view="recipe"
  currentRecipe=recipe
  app.innerHTML=""

  const back=document.createElement("div")
  back.className="back"
  back.innerText="← Back"
  back.onclick=()=>renderCategory(recipe.category)
  app.appendChild(back)

  const card=document.createElement("div")
  card.className="recipe-card"

  card.innerHTML=`
  <div class="recipe-title">${recipe["name_"+language]}</div>
  <div class="orange-line"></div>

  ${recipe.image ? `<img src="${recipe.image}" class="recipe-image">` : ""}

  <div class="meta-box">
    <div class="meta-item">${recipe["yield_"+language] || ""}</div>
    <div class="meta-item">${recipe["time_"+language] || ""}</div>
    <div class="meta-item">${recipe["holding_"+language] || ""}</div>
  </div>

  <div class="columns">
    <div style="flex:1">
      <div class="section-header">INGREDIENTS</div>
      <ul>${(recipe["ingredients_"+language]||[]).map(i=>"<li>"+i+"</li>").join("")}</ul>
    </div>
    <div style="flex:1">
      <div class="section-header">PROCEDURE</div>
      <ol>${(recipe["procedure_"+language]||[]).map(p=>"<li>"+p+"</li>").join("")}</ol>
    </div>
  </div>

  ${recipe.plating ? `
    <div class="plating-box">
      <h3>PLATING</h3>
      <p>${recipe["plating_"+language] || recipe.plating}</p>
    </div>
  ` : ""}
`
  app.appendChild(card)
}

function createSearch(){
  const wrapper=document.createElement("div")
  wrapper.className="search-wrapper"

  const input=document.createElement("input")
  input.className="search"
  input.placeholder="Search recipes..."

  const dropdown=document.createElement("div")
  dropdown.className="dropdown"

  input.oninput=()=>{
    const val=input.value.toLowerCase()
    dropdown.innerHTML=""
    if(!val){dropdown.style.display="none";return}

    const matches=RECIPES.filter(r =>
      r["name_"+language].toLowerCase().includes(val)
    )

    matches.forEach(r=>{
      const div=document.createElement("div")
      div.innerText=r["name_"+language]
      div.onclick=()=>renderRecipe(r)
      dropdown.appendChild(div)
    })

    dropdown.style.display=matches.length?"block":"none"
  }

  wrapper.appendChild(input)
  wrapper.appendChild(dropdown)
  return wrapper
}

document.getElementById("langBtn").onclick=function(){
  language=language==="en"?"es":"en"

  if(view==="home") renderHome()
  if(view==="category") renderCategory(currentCategory)
  if(view==="recipe") renderRecipe(currentRecipe)
}

renderHome()

})
</script>

</body>
</html>
