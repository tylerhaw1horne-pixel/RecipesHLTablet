<script>

document.addEventListener("DOMContentLoaded", async function(){

let language="en"
let view="home"
let currentCategory=null
let currentRecipe=null
let RECIPES=[]

const files=[
  {file:"items_sides.json", category:"items_sides", category_en:"Items & Sides", category_es:"Artículos y Acompañantes"},
  {file:"sauces_spices.json", category:"sauces_spices", category_en:"Sauces & Spices", category_es:"Salsas y Especias"},
  {file:"dressings.json", category:"dressings", category_en:"Dressings", category_es:"Aderezos"},
  {file:"food_prepped.json", category:"food_prepped", category_en:"Food Prepped", category_es:"Preparación"},
  {file:"desserts.json", category:"desserts", category_en:"Desserts", category_es:"Postres"},
  {file:"brunch.json", category:"brunch", category_en:"Brunch", category_es:"Brunch"}
]

/* ===== LOAD JSON FILES ===== */

for(const f of files){
  const res=await fetch(f.file)
  const data=await res.json()

  data.forEach(r=>{
    r.category=f.category                // stable internal key
    r.category_en=f.category_en          // display EN
    r.category_es=f.category_es          // display ES
    r.procedure_en=r.procedure_detailed_en
    r.procedure_es=r.procedure_detailed_es
  })

  RECIPES=RECIPES.concat(data)
}

const app=document.getElementById("app")

/* ===== SEARCH ===== */

function createSearch(){
  const wrapper=document.createElement("div")
  wrapper.className="search-wrapper"

  const input=document.createElement("input")
  input.className="search"
  input.placeholder="Search recipes..."

  const dropdown=document.createElement("div")
  dropdown.className="dropdown"

  input.oninput=()=>{
    const val=input.value.toLowerCase()
    dropdown.innerHTML=""
    if(!val){dropdown.style.display="none";return}

    const matches=RECIPES.filter(r =>
      r["name_"+language].toLowerCase().includes(val)
    )

    matches.forEach(r=>{
      const div=document.createElement("div")
      div.innerText=r["name_"+language]
      div.onclick=()=>renderRecipe(r)
      dropdown.appendChild(div)
    })

    dropdown.style.display=matches.length?"block":"none"
  }

  wrapper.appendChild(input)
  wrapper.appendChild(dropdown)
  return wrapper
}

/* ===== HOME ===== */

function renderHome(){
  view="home"
  currentCategory=null
  currentRecipe=null
  app.innerHTML=""

  app.appendChild(createSearch())

  const grid=document.createElement("div")
  grid.className="grid"

  const uniqueCategories=[...new Set(RECIPES.map(r=>r.category))]

  uniqueCategories.forEach(catKey=>{
    const sample=RECIPES.find(r=>r.category===catKey)
    const displayName=sample["category_"+language]

    const card=document.createElement("div")
    card.className="card"
    card.innerText=displayName
    card.onclick=()=>renderCategory(catKey)
    grid.appendChild(card)
  })

  app.appendChild(grid)
}

/* ===== CATEGORY ===== */

function renderCategory(catKey){
  view="category"
  currentCategory=catKey
  currentRecipe=null
  app.innerHTML=""

  const back=document.createElement("div")
  back.className="back"
  back.innerText="← Back"
  back.onclick=renderHome
  app.appendChild(back)

  app.appendChild(createSearch())

  const grid=document.createElement("div")
  grid.className="grid"

  RECIPES.filter(r=>r.category===catKey)
    .forEach(r=>{
      const card=document.createElement("div")
      card.className="card"
      card.innerText=r["name_"+language]
      card.onclick=()=>renderRecipe(r)
      grid.appendChild(card)
    })

  app.appendChild(grid)
}

/* ===== RECIPE ===== */

function renderRecipe(recipe){
  view="recipe"
  currentRecipe=recipe
  app.innerHTML=""

  const back=document.createElement("div")
  back.className="back"
  back.innerText="← Back"
  back.onclick=()=>renderCategory(recipe.category)
  app.appendChild(back)

  const card=document.createElement("div")
  card.className="recipe-card"

  card.innerHTML=`
    <div class="recipe-title">${recipe["name_"+language]}</div>
    <div class="title-underline"></div>

    <div class="recipe-meta">${recipe["yield_"+language]}</div>
    <div class="recipe-meta">${recipe["time_"+language]}</div>
    <div class="recipe-meta"><em>${recipe["holding_"+language]}</em></div>

    <div class="columns">
      <div>
        <div class="section-header">INGREDIENTS</div>
        <ul>${recipe["ingredients_"+language].map(i=>"<li>"+i+"</li>").join("")}</ul>
      </div>
      <div>
        <div class="section-header">PROCEDURE</div>
        <ol>${recipe["procedure_"+language].map(p=>"<li>"+p+"</li>").join("")}</ol>
      </div>
    </div>
  `

  app.appendChild(card)
}

/* ===== TOGGLE (FIXED FOREVER) ===== */

document.getElementById("langBtn").onclick=function(){
  language=language==="en"?"es":"en"

  if(view==="home") renderHome()
  if(view==="category") renderCategory(currentCategory)
  if(view==="recipe") renderRecipe(currentRecipe)
}

/* ===== START ===== */

renderHome()

})
</script>
